<!DOCTYPE html>
<html lang="fr">
  <head>
    <title>geOrchestra sviewer</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="dns-prefetch" href="https://data.geopf.fr">
    <!-- external libraries -->
    <script src="lib/jquery/jquery-1.12.4.min.js" defer></script>
    <script src="build/proj4.js" defer></script>
    <!-- OpenLayers 10 (self-hosted) -->
    <link rel="stylesheet" href="build/ol.css">
    <script src="build/ol.js" defer></script>
    <!-- Bootstrap (scoped to prevent CSS pollution) -->
    <link rel="stylesheet" href="lib/bootstrap/bootstrap-scoped.min.css">
    <script src="lib/bootstrap/bootstrap.bundle.min.js" defer></script>
    <!-- Bootstrap Icons (self-hosted) -->
    <link rel="stylesheet" href="lib/bootstrap-icons/bootstrap-icons.min.css">
    <script>
var customConfig = {};
    </script>
    <!-- local -->
    <link rel="stylesheet" href="css/sviewer.css">
    <script src="js/sviewer.js" defer></script>
    <script src="etc/i18n.js" defer></script>
  </head>
  <body>
    <!-- Skip to main content link for keyboard navigation -->
    <a href="#map" class="skip-to-content">Skip to map</a>

    <!-- Bootstrap styles scoped to sv-scope to prevent CSS pollution -->
    <div class="sv-scope">
    <!-- Loading spinner -->
    <div id="svSpinner" class="sv-spinner">
      <div class="spinner-border text-light" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
    </div>

    <!-- content -->
      <div id="frameMap" class="sv-framemap">
        <!-- map -->
        <div id="map" class="sv-map" tabindex="0" role="region" aria-label="Interactive map">
            <div id="marker"></div>
        </div>

        <!-- map controls -->
        <div id="mapcontrols" class="sv-map-controls" role="group" aria-label="Map controls">
          <button id="zeBt" type="button" accesskey="w" class="i18n btn btn-dark sv-map-btn" title="initial view" aria-label="Reset to initial view">
            <i class="bi bi-house" aria-hidden="true"></i>
          </button>
          <button id="ziBt" type="button" accesskey="+" class="i18n btn btn-dark sv-map-btn" title="zoom +" aria-label="Zoom in">
            <i class="bi bi-zoom-in" aria-hidden="true"></i>
          </button>
          <button id="zoBt" type="button" accesskey="-" class="i18n btn btn-dark sv-map-btn" title="zoom -" aria-label="Zoom out">
            <i class="bi bi-zoom-out" aria-hidden="true"></i>
          </button>
          <button id="bgBt" type="button" accesskey="b" class="i18n btn btn-dark sv-map-btn" title="background" aria-label="Change background layer">
            <i class="bi bi-layers" aria-hidden="true"></i>
          </button>
          <button id="zpBt" type="button" accesskey="g" class="i18n btn btn-dark sv-map-btn" title="Where am I ?" aria-label="Locate my position">
            <i class="bi bi-geo-alt" aria-hidden="true"></i>
          </button>
        </div>
        <div id="panelcontrols" class="sv-map-panels" role="group" aria-label="Side panels">
          <button type="button" accesskey="m" id="panelShareBtn" class="i18n btn btn-dark sv-map-btn sv-panel-toggle" data-panel="share" title="Map" aria-label="Map panel" aria-pressed="false">
            <span id="panelShareBtnTitle">Map</span><span class="d-none">&nbsp;</span>
            <i class="bi bi-share" aria-hidden="true"></i>
          </button>
          <button type="button" accesskey="i" id="panelInfoBtn" class="i18n btn btn-dark sv-map-btn sv-panel-toggle" data-panel="legend" title="Legend" aria-label="Legend panel" aria-pressed="false">
            <i class="bi bi-list" aria-hidden="true"></i>
          </button>
          <button type="button" accesskey="q" id="panelQueryBtn" class="i18n btn btn-dark sv-map-btn sv-panel-toggle" data-panel="query" title="Query" aria-label="Query panel" aria-pressed="false">
            <i class="bi bi-question-circle" aria-hidden="true"></i>
          </button>
          <button type="button" accesskey="l" id="panelLocateBtn" class="i18n btn btn-dark sv-map-btn sv-panel-toggle" data-panel="locate" title="Locate" aria-label="Locate panel" aria-pressed="false">
            <i class="bi bi-search" aria-hidden="true"></i>
          </button>
        </div>

        <!-- Side panel for toggled content -->
        <div id="sidepanel" class="sv-sidepanel" role="complementary" aria-label="Information panel">
          <button type="button" class="sv-sidepanel-close" aria-label="Close panel">&times;</button>
          <div id="sharePanel" class="sv-panel-section" data-section="share" aria-label="Map sharing panel" style="display: none;">
            <div class="sv-panel-content">
              <div class="mb-3">
                <label for="shareSetTitle" class="form-label i18n">Title</label>
                <input type="text" name="setTitle" id="shareSetTitle" class="form-control" value="" placeholder="change title">
              </div>
              <form id="georchestraForm" target="_blank" method="post" action="" class="mb-3">
                <input type="hidden" id="georchestraFormData" name="data" value="">
                <input type="submit" class="i18n btn btn-primary w-100" title="Edit with Mapfishapp" value="Mapfishapp">
              </form>
              <div class="mb-3">
                <a id="permalink" class="i18n btn btn-secondary w-100" data-ajax="false" href="#" title="Permalink to this map">Permalink</a>
              </div>
              <div class="text-center">
                <div id="qrcode"></div>
              </div>
            </div>
          </div>

          <div id="legendPanel" class="sv-panel-section" data-section="legend" aria-label="Map legend" style="display: none;">
            <div id="legend" class="sv-legend sv-panel-content"></div>
          </div>

          <div id="queryPanel" class="sv-panel-section" data-section="query" aria-label="Map query results" style="display: none;">
            <div id="querycontent" class="i18n sv-panel-content" role="status" aria-live="polite">Query the map</div>
          </div>

          <div id="locatePanel" class="sv-panel-section" data-section="locate" aria-label="Location search panel" style="display: none;">
            <div class="sv-panel-content">
              <form id="addressForm" method="post" action="#">
                <div class="mb-3">
                  <label for="searchInput" class="form-label i18n">Address and/or city</label>
                  <input type="text"
                      name="searchInput"
                      id="searchInput"
                      class="form-control"
                      value=""
                      title="Address and/or city"
                      placeholder="ex: 10 rue Maurice Fabre, Rennes"
                      autocomplete="off">
                </div>
              </form>
              <div id="locateMsg" role="status" aria-live="polite" class="mb-3"></div>
              <div>
                <ul id="searchResults" class="list-group" role="listbox" aria-label="Search results"></ul>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div id="panelSLDModal" class="modal fade" tabindex="-1" role="dialog" aria-labelledby="sldModalTitle" aria-hidden="true">
        <div class="modal-dialog modal-lg">
          <div class="modal-content">
            <div class="modal-header">
              <h3 class="modal-title i18n" id="sldModalTitle">Parameters</h3>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
              <!-- SLD controls -->
              <div id="SLDsliders">
              </div>
            </div>
          </div>
        </div>
      </div>
      <!-- share panel -->
      <div id="panelShareModal" class="modal fade" tabindex="-1" role="dialog" aria-labelledby="shareModalTitle" aria-hidden="true">
        <div class="modal-dialog modal-lg">
          <div class="modal-content">
            <div class="modal-header">
              <h3 class="modal-title i18n" id="shareModalTitle">Map</h3>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
              <div class="mb-3">
                <label for="modalSetTitle" class="form-label i18n">Title</label>
                <input type="text" name="setTitle" id="modalSetTitle" class="form-control i18n" value="" placeholder="change title">
              </div>
              <div class="row">
                <div class="col-md-6">
                  <form id="georchestraForm" target="_blank" method="post" action="">
                    <input type="hidden" id="georchestraFormData" name="data" value="">
                    <input type="submit" class="i18n btn btn-primary w-100" title="Edit with Mapfishapp" value="Mapfishapp">
                  </form>
                </div>
                <!-- QR code -->
                <div class="col-md-6">
                  <div class="sv-permalink-wrap">
                    <a id="permalink" class="i18n btn btn-secondary d-block mb-3" data-ajax="false" href="#" title="Permalink to this map">Permalink</a>
                    <div id="qrcode"></div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div><!-- end sv-scope wrapper -->
  </body>
</html>
