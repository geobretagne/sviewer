<!DOCTYPE html>
<html lang="fr">
  <head>
    <title>geOrchestra sviewer</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <!-- external libraries -->
    <script src="lib/jquery/jquery-1.12.4.min.js"></script>
    <script src="lib/qrcode.js/qrcode.min.js"></script>
    <script src="build/proj4.js"></script>
    <!-- OpenLayers 10 -->
    <link rel="stylesheet" href="https://unpkg.com/ol@10.8.0/ol.css">
    <script src="https://unpkg.com/ol@10.8.0/dist/ol.js"></script>
    <!-- Bootstrap -->
    <link rel="stylesheet" href="lib/bootstrap/bootstrap.min.css">
    <script src="lib/bootstrap/bootstrap.bundle.min.js"></script>
    <script>
var customConfig = {};
    </script>
    <!-- local -->
    <link rel="stylesheet" href="css/sviewer.css">
    <script src="js/sviewer.js"></script>
    <script src="etc/i18n.js"></script>
  </head>
  <body>
    <!-- Loading spinner -->
    <div id="svSpinner" class="sv-spinner">
      <div class="spinner-border text-light" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
    </div>

    <!-- content -->
      <div id="frameMap" class="sv-framemap">
        <!-- map -->
        <div id="map" class="sv-map" tabindex="0">
            <div id="marker"></div>
        </div>

        <!-- map controls -->
        <div id="mapcontrols" class="sv-map-controls">
          <button id="zeBt" type="button" accesskey="w" class="i18n btn btn-dark sv-map-btn" title="initial view">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="white">
              <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm0-12c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4z"/>
            </svg>
          </button>
          <button id="ziBt" type="button" accesskey="+" class="i18n btn btn-dark sv-map-btn" title="zoom +">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="white">
              <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14zm2.5-4h-2v2H9v-2H7V9h2V7h1v2h2v1z"/>
            </svg>
          </button>
          <button id="zoBt" type="button" accesskey="-" class="i18n btn btn-dark sv-map-btn" title="zoom -">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="white">
              <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4 11h-8v-2h8v2z"/>
            </svg>
          </button>
          <button id="bgBt" type="button" accesskey="b" class="i18n btn btn-dark sv-map-btn" title="background">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="white">
              <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14zm-5.04-6.71l-2.75 3.54h2.86l2.88-3.63-4.99-6.63L7 13h4.04z"/>
            </svg>
          </button>
        </div>

        <div id="panelcontrols" class="sv-map-panels btn-group" role="group">
          <button type="button" accesskey="m" id="panelShareBtn" class="i18n btn btn-dark sv-map-btn" data-bs-toggle="modal" data-bs-target="#panelShareModal" title="Map">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="white">
              <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5h3V9h4v3h3l-5 5z"/>
            </svg>
            <span id="panelShareBtnTitle">Map</span>
          </button>
          <button type="button" accesskey="i" id="panelInfoBtn" class="i18n btn btn-dark sv-map-btn" data-bs-toggle="modal" data-bs-target="#panelInfoModal" title="Legend">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="white">
              <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
            </svg>
          </button>
          <button type="button" accesskey="q" id="panelQueryBtn" class="i18n btn btn-dark sv-map-btn" data-bs-toggle="modal" data-bs-target="#panelQueryModal" title="Query">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="white">
              <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
            </svg>
          </button>
          <button type="button" accesskey="l" id="panelLocateBtn" class="i18n btn btn-dark sv-map-btn" data-bs-toggle="modal" data-bs-target="#panelLocateModal" title="Locate">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="white">
              <path d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94-2.06c-.46-1.06-1.09-2.04-1.85-2.89-.77-.85-1.74-1.5-2.79-1.98-.13-.06-.26-.09-.39-.09-.19 0-.37.06-.52.17-.72.51-1.87 1.75-1.99 1.99-.23.45-.44.72-.44 1.31 0 .59.22.87.45 1.31.13.24 1.27 1.48 1.99 1.99.16.11.33.17.52.17.13 0 .26-.03.39-.09 1.05-.48 2.02-1.13 2.79-1.98.75-.85 1.38-1.83 1.85-2.89l-1.73-1.73zm-6.94 14.06c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm0 7c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm0-3c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/>
            </svg>
          </button>
        </div>
      </div>
      <!-- getfeatureinfo panel -->
      <div id="panelQueryModal" class="modal fade" tabindex="-1">
        <div class="modal-dialog modal-lg">
          <div class="modal-content">
            <div class="modal-header">
              <h3 class="modal-title i18n">Query</h3>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
              <div id="querycontent" class="i18n">Query the map</div>
            </div>
          </div>
        </div>
      </div>
      <!-- info panel -->
      <div id="panelInfoModal" class="modal fade" tabindex="-1">
        <div class="modal-dialog modal-lg">
          <div class="modal-content">
            <div class="modal-header">
              <h3 class="modal-title i18n">Legend</h3>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
              <div id="legend" class="sv-legend"></div>
            </div>
          </div>
        </div>
      </div>
      <!-- locate panel -->
      <div id="panelLocateModal" class="modal fade" tabindex="-1">
        <div class="modal-dialog modal-lg">
          <div class="modal-content">
            <div class="modal-header">
              <h3 class="modal-title i18n">Locate</h3>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
              <form id="addressForm" method="post" action="#">
                <div class="mb-3">
                  <label for="searchInput" class="form-label i18n">Address and/or city</label>
                  <div class="input-group">
                    <input type="text"
                        name="searchInput"
                        id="searchInput"
                        class="form-control"
                        value=""
                        title="Address and/or city">
                    <button type="submit" class="i18n btn btn-outline-secondary" title="Locate">Locate</button>
                  </div>
                </div>
                <div class="mb-3">
                  <button type="button" id="zpBt" class="i18n btn btn-secondary" title="Where am I ?">Where am I ?</button>
                  <span id="locateMsg"></span>
                </div>
              </form>
              <div>
                <ul id="searchResults" class="list-group"></ul>
              </div>
            </div>
          </div>
        </div>
      </div>
      <!-- sld panel -->
      <div id="panelSLDModal" class="modal fade" tabindex="-1">
        <div class="modal-dialog modal-lg">
          <div class="modal-content">
            <div class="modal-header">
              <h3 class="modal-title i18n">Parameters</h3>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
              <!-- SLD controls -->
              <div id="SLDsliders">
              </div>
            </div>
          </div>
        </div>
      </div>
      <!-- share panel -->
      <div id="panelShareModal" class="modal fade" tabindex="-1">
        <div class="modal-dialog modal-lg">
          <div class="modal-content">
            <div class="modal-header">
              <h3 class="modal-title i18n">Map</h3>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
              <div class="mb-3">
                <label for="setTitle" class="form-label i18n">Title</label>
                <input type="text" name="setTitle" id="setTitle" class="form-control i18n" value="" placeholder="change title">
              </div>
              <div class="row">
                <div class="col-md-6">
                  <!-- social links -->
                  <div id="socialLinks" class="mb-3"></div>
                  <!-- to georchestra viewer -->
                  <form id="georchestraForm" target="_blank" method="post" action="">
                    <input type="hidden" id="georchestraFormData" name="data" value="">
                    <input type="submit" class="i18n btn btn-primary w-100" title="Edit with geOrchestra" value="geOrchestra">
                  </form>
                </div>
                <!-- QR code -->
                <div class="col-md-6">
                  <div class="sv-permalink-wrap">
                    <a id="permalink" class="i18n btn btn-secondary d-block mb-3" data-ajax="false" href="#" title="Permalink to this map">Permalink</a>
                    <div id="qrcode"></div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
  </body>
</html>
