<!DOCTYPE html>
<html lang="fr">
  <head>
    <title>geOrchestra sviewer</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <!-- external libraries -->
    <script src="lib/jquery/jquery-1.12.4.min.js"></script>
    <script src="lib/qrcode.js/qrcode.min.js"></script>
    <script src="build/proj4.js"></script>
    <!-- OpenLayers 10 -->
    <link rel="stylesheet" href="https://unpkg.com/ol@10.8.0/ol.css">
    <script src="https://unpkg.com/ol@10.8.0/dist/ol.js"></script>
    <!-- Bootstrap -->
    <link rel="stylesheet" href="lib/bootstrap/bootstrap.min.css">
    <script src="lib/bootstrap/bootstrap.bundle.min.js"></script>
    <script>
var customConfig = {};
    </script>
    <!-- local -->
    <link rel="stylesheet" href="css/sviewer.css">
    <script src="js/sviewer.js"></script>
    <script src="etc/i18n.js"></script>
  </head>
  <body>
    <!-- Loading spinner -->
    <div id="svSpinner" class="sv-spinner">
      <div class="spinner-border text-light" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
    </div>

    <!-- content -->
      <div id="frameMap" class="sv-framemap">
        <!-- map -->
        <div id="map" class="sv-map" tabindex="0">
            <div id="marker"></div>
        </div>

        <!-- map controls -->
        <div id="mapcontrols" class="sv-map-controls">
          <button id="zeBt" type="button" accesskey="w" class="i18n btn btn-dark sv-map-btn" title="initial view">
            <svg width="20" height="20" viewBox="0 0 24 24" stroke-width="1.5" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M2 8L11.7317 3.13416C11.9006 3.04971 12.0994 3.0497 12.2683 3.13416L22 8" stroke="white" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M20 11V19C20 20.1046 19.1046 21 18 21H6C4.89543 21 4 20.1046 4 19V11" stroke="white" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <button id="ziBt" type="button" accesskey="+" class="i18n btn btn-dark sv-map-btn" title="zoom +">
            <svg width="20" height="20" viewBox="0 0 24 24" stroke-width="1.5" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M8 11H11M14 11H11M11 11V8M11 11V14" stroke="white" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M17 17L21 21" stroke="white" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M3 11C3 15.4183 6.58172 19 11 19C13.213 19 15.2161 18.1015 16.6644 16.6493C18.1077 15.2022 19 13.2053 19 11C19 6.58172 15.4183 3 11 3C6.58172 3 3 6.58172 3 11Z" stroke="white" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <button id="zoBt" type="button" accesskey="-" class="i18n btn btn-dark sv-map-btn" title="zoom -">
            <svg width="20" height="20" viewBox="0 0 24 24" stroke-width="1.5" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M17 17L21 21" stroke="white" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M3 11C3 15.4183 6.58172 19 11 19C13.213 19 15.2161 18.1015 16.6644 16.6493C18.1077 15.2022 19 13.2053 19 11C19 6.58172 15.4183 3 11 3C6.58172 3 3 6.58172 3 11Z" stroke="white" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M8 11L14 11" stroke="white" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <button id="bgBt" type="button" accesskey="b" class="i18n btn btn-dark sv-map-btn" title="background">
            <svg width="20" height="20" stroke-width="1.5" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M9 19L3.78974 20.7368C3.40122 20.8663 3 20.5771 3 20.1675L3 5.43246C3 5.1742 3.16526 4.94491 3.41026 4.86325L9 3M9 19L15 21M9 19L9 3M15 21L20.5897 19.1368C20.8347 19.0551 21 18.8258 21 18.5675L21 3.83246C21 3.42292 20.5988 3.13374 20.2103 3.26325L15 5M15 21L15 5M15 5L9 3" stroke="white" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>

        <div id="panelcontrols" class="sv-map-panels btn-group" role="group">
          <button type="button" accesskey="m" id="panelShareBtn" class="i18n btn btn-dark sv-map-btn sv-panel-toggle" data-panel="share" title="Map">
            <svg width="20" height="20" stroke-width="1.5" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M18 22C19.6569 22 21 20.6569 21 19C21 17.3431 19.6569 16 18 16C16.3431 16 15 17.3431 15 19C15 20.6569 16.3431 22 18 22Z" stroke="white" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M18 8C19.6569 8 21 6.65685 21 5C21 3.34315 19.6569 2 18 2C16.3431 2 15 3.34315 15 5C15 6.65685 16.3431 8 18 8Z" stroke="white" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M6 15C7.65685 15 9 13.6569 9 12C9 10.3431 7.65685 9 6 9C4.34315 9 3 10.3431 3 12C3 13.6569 4.34315 15 6 15Z" stroke="white" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M15.5 6.5L8.5 10.5" stroke="white" stroke-width="1.5"/>
              <path d="M8.5 13.5L15.5 17.5" stroke="white" stroke-width="1.5"/>
            </svg>
            <span id="panelShareBtnTitle">Map</span>
          </button>
          <button type="button" accesskey="i" id="panelInfoBtn" class="i18n btn btn-dark sv-map-btn sv-panel-toggle" data-panel="legend" title="Legend">
            <svg width="20" height="20" stroke-width="1.5" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M8 6L20 6" stroke="white" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M4 6.01L4.01 5.99889" stroke="white" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M4 12.01L4.01 11.9989" stroke="white" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M4 18.01L4.01 17.9989" stroke="white" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M8 12L20 12" stroke="white" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M8 18L20 18" stroke="white" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <button type="button" accesskey="q" id="panelQueryBtn" class="i18n btn btn-dark sv-map-btn sv-panel-toggle" data-panel="query" title="Query">
            <svg width="20" height="20" stroke-width="1.5" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 13C12.5523 13 13 12.5523 13 12C13 11.4477 12.5523 11 12 11C11.4477 11 11 11.4477 11 12C11 12.5523 11.4477 13 12 13Z" fill="white" stroke="white" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22Z" stroke="white" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <button type="button" accesskey="l" id="panelLocateBtn" class="i18n btn btn-dark sv-map-btn sv-panel-toggle" data-panel="locate" title="Locate">
            <svg width="20" height="20" viewBox="0 0 24 24" stroke-width="1.5" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M17 17L21 21" stroke="white" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M3 11C3 15.4183 6.58172 19 11 19C13.213 19 15.2161 18.1015 16.6644 16.6493C18.1077 15.2022 19 13.2053 19 11C19 6.58172 15.4183 3 11 3C6.58172 3 3 6.58172 3 11Z" stroke="white" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>

        <!-- Side panel for toggled content -->
        <div id="sidepanel" class="sv-sidepanel">
          <button type="button" class="sv-sidepanel-close" aria-label="Close panel">&times;</button>
          <div id="sharePanel" class="sv-panel-section" data-section="share" style="display: none;">
            <h3 class="sv-panel-title i18n">Map</h3>
            <div class="sv-panel-content">
              <div class="mb-3">
                <label for="setTitle" class="form-label i18n">Title</label>
                <input type="text" name="setTitle" id="setTitle" class="form-control i18n" value="" placeholder="change title">
              </div>
              <div class="row">
                <div class="col-md-6">
                  <form id="georchestraForm" target="_blank" method="post" action="">
                    <input type="hidden" id="georchestraFormData" name="data" value="">
                    <input type="submit" class="i18n btn btn-primary w-100" title="Edit with Mapfishapp" value="Mapfishapp">
                  </form>
                </div>
                <div class="col-md-6">
                  <div class="sv-permalink-wrap">
                    <a id="permalink" class="i18n btn btn-secondary d-block mb-3" data-ajax="false" href="#" title="Permalink to this map">Permalink</a>
                    <div id="qrcode"></div>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div id="legendPanel" class="sv-panel-section" data-section="legend" style="display: none;">
            <h3 class="sv-panel-title i18n">Legend</h3>
            <div id="legend" class="sv-legend sv-panel-content"></div>
          </div>

          <div id="queryPanel" class="sv-panel-section" data-section="query" style="display: none;">
            <h3 class="sv-panel-title i18n">Query</h3>
            <div id="querycontent" class="i18n sv-panel-content">Query the map</div>
          </div>

          <div id="locatePanel" class="sv-panel-section" data-section="locate" style="display: none;">
            <h3 class="sv-panel-title i18n">Locate</h3>
            <div class="sv-panel-content">
              <form id="addressForm" method="post" action="#">
                <div class="mb-3">
                  <label for="searchInput" class="form-label i18n">Address and/or city</label>
                  <div class="input-group">
                    <input type="text"
                        name="searchInput"
                        id="searchInput"
                        class="form-control"
                        value=""
                        title="Address and/or city">
                    <button type="submit" class="i18n btn btn-outline-secondary" title="Locate">Locate</button>
                  </div>
                </div>
                <div class="mb-3">
                  <button type="button" id="zpBt" class="i18n btn btn-secondary" title="Where am I ?">Where am I ?</button>
                  <span id="locateMsg"></span>
                </div>
              </form>
              <div>
                <ul id="searchResults" class="list-group"></ul>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div id="panelSLDModal" class="modal fade" tabindex="-1">
        <div class="modal-dialog modal-lg">
          <div class="modal-content">
            <div class="modal-header">
              <h3 class="modal-title i18n">Parameters</h3>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
              <!-- SLD controls -->
              <div id="SLDsliders">
              </div>
            </div>
          </div>
        </div>
      </div>
      <!-- share panel -->
      <div id="panelShareModal" class="modal fade" tabindex="-1">
        <div class="modal-dialog modal-lg">
          <div class="modal-content">
            <div class="modal-header">
              <h3 class="modal-title i18n">Map</h3>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
              <div class="mb-3">
                <label for="setTitle" class="form-label i18n">Title</label>
                <input type="text" name="setTitle" id="setTitle" class="form-control i18n" value="" placeholder="change title">
              </div>
              <div class="row">
                <div class="col-md-6">
                  <form id="georchestraForm" target="_blank" method="post" action="">
                    <input type="hidden" id="georchestraFormData" name="data" value="">
                    <input type="submit" class="i18n btn btn-primary w-100" title="Edit with Mapfishapp" value="Mapfishapp">
                  </form>
                </div>
                <!-- QR code -->
                <div class="col-md-6">
                  <div class="sv-permalink-wrap">
                    <a id="permalink" class="i18n btn btn-secondary d-block mb-3" data-ajax="false" href="#" title="Permalink to this map">Permalink</a>
                    <div id="qrcode"></div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
  </body>
</html>
