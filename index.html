<!DOCTYPE html>
<html lang="fr">
<head>
    <title>sViewer</title>
    <meta charset="utf-8">
    <meta name="description" content="Visualiseur de cartes simple pour consulter rapidement une donnée en flux WMS">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1a1a2e">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="img/icon-192.png">
    <link rel="apple-touch-icon" href="img/icon-192.png">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #f4f4f5;
            overflow: hidden;
        }
        body {
            display: flex;
            flex-direction: column;
        }
        #sviewer {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 0;
            visibility: hidden;
        }
        #frameMap {
            flex: 1;
            overflow: hidden;
            position: relative;
        }
        #panelShareBtn {
            width: auto;
            min-width: 44px;
            padding: 0 12px;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div id="sviewer"></div>

    <script src="js/embed.js"></script>
    <script>
        // Register Service Worker for offline support
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => {
                console.debug('Service Worker registration failed:', err);
            });
        }

        // Wait for DOM to be ready, then initialize with URL parameters
        function initMap() {
            var params = {};
            var qs = window.location.search.substring(1);
            if (qs) {
                qs.split('&').forEach(function(pair) {
                    var parts = pair.split('=');
                    params[parts[0]] = decodeURIComponent(parts[1] || '');
                });
            }
            SViewer.init('#sviewer', params);
        }

        // Wait for embed.js to be loaded
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initMap);
        } else {
            initMap();
        }
    </script>
</body>
</html>
