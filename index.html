<!DOCTYPE html>
<html lang="fr">
  <head>
    <title>geOrchestra sviewer</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <!-- external libraries -->
    <script src="lib/jquery/jquery-1.12.4.min.js"></script>
    <script src="lib/qrcode.js/qrcode.min.js"></script>
    <script src="build/proj4.js"></script>
    <!-- OpenLayers -->
    <!--
    <link rel="stylesheet" href="build/ol.css">
    <script src="build/ol-simple.js"></script>
    -->
    <link rel="stylesheet" href="build/ol.css">
    <script src="build/ol.js"></script>
    <!-- Bootstrap -->
    <link rel="stylesheet" href="lib/bootstrap/bootstrap.min.css">
    <script src="lib/bootstrap/bootstrap.bundle.min.js"></script>
    <script>
var customConfig = {};
    </script>
    <!-- local -->
    <link rel="stylesheet" href="css/sviewer.css">
    <script src="js/sviewer.js"></script>
    <script src="etc/i18n.js"></script>
  </head>
  <body>
    <!-- Loading spinner -->
    <div id="svSpinner" class="sv-spinner">
      <div class="spinner-border text-light" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
    </div>

    <!-- content -->
      <div id="frameMap" class="sv-framemap">
        <!-- map -->
        <div id="map" class="sv-map" tabindex="0">
            <div id="marker"></div>
        </div>

        <!-- map controls -->
        <div id="mapcontrols" class="sv-map-controls">
          <button id="zeBt" type="button" accesskey="w" class="i18n btn btn-dark sv-map-btn" title="initial view">initial view</button>
          <button id="ziBt" type="button" accesskey="+" class="i18n btn btn-dark sv-map-btn" title="zoom +">zoom +</button>
          <button id="zoBt" type="button" accesskey="-" class="i18n btn btn-dark sv-map-btn" title="zoom -">zoom -</button>
          <button id="bgBt" type="button" accesskey="b" class="i18n btn btn-dark sv-map-btn" title="background">background</button>
        </div>

        <div id="panelcontrols" class="sv-map-panels btn-group-vertical" role="group">
          <button type="button" accesskey="m" id="panelShareBtn" class="i18n btn btn-dark" data-bs-toggle="modal" data-bs-target="#panelShareModal" title="Map">Map</button>
          <button type="button" accesskey="i" id="panelInfoBtn" class="i18n btn btn-dark" data-bs-toggle="modal" data-bs-target="#panelInfoModal" title="Legend">Legend</button>
          <button type="button" accesskey="q" id="panelQueryBtn" class="i18n btn btn-dark" data-bs-toggle="modal" data-bs-target="#panelQueryModal" title="Query">Query</button>
          <button type="button" accesskey="l" id="panelLocateBtn" class="i18n btn btn-dark" data-bs-toggle="modal" data-bs-target="#panelLocateModal" title="Locate">Locate</button>
        </div>
      </div>
      <!-- getfeatureinfo panel -->
      <div id="panelQueryModal" class="modal fade" tabindex="-1">
        <div class="modal-dialog modal-lg">
          <div class="modal-content">
            <div class="modal-header">
              <h3 class="modal-title i18n">Query</h3>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
              <div id="querycontent" class="i18n">Query the map</div>
            </div>
          </div>
        </div>
      </div>
      <!-- info panel -->
      <div id="panelInfoModal" class="modal fade" tabindex="-1">
        <div class="modal-dialog modal-lg">
          <div class="modal-content">
            <div class="modal-header">
              <h3 class="modal-title i18n">Legend</h3>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
              <div id="legend" class="sv-legend"></div>
            </div>
          </div>
        </div>
      </div>
      <!-- locate panel -->
      <div id="panelLocateModal" class="modal fade" tabindex="-1">
        <div class="modal-dialog modal-lg">
          <div class="modal-content">
            <div class="modal-header">
              <h3 class="modal-title i18n">Locate</h3>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
              <form id="addressForm" method="post" action="#">
                <div class="mb-3">
                  <label for="searchInput" class="form-label i18n">Address and/or city</label>
                  <div class="input-group">
                    <input type="text"
                        name="searchInput"
                        id="searchInput"
                        class="form-control"
                        value=""
                        title="Address and/or city">
                    <button type="button" class="i18n btn btn-outline-secondary" title="Locate">Locate</button>
                  </div>
                </div>
                <div class="mb-3">
                  <button type="button" id="zpBt" class="i18n btn btn-secondary" title="Where am I ?">Where am I ?</button>
                  <span id="locateMsg"></span>
                </div>
              </form>
              <div>
                <ul id="searchResults" class="list-group"></ul>
              </div>
            </div>
          </div>
        </div>
      </div>
      <!-- sld panel -->
      <div id="panelSLDModal" class="modal fade" tabindex="-1">
        <div class="modal-dialog modal-lg">
          <div class="modal-content">
            <div class="modal-header">
              <h3 class="modal-title i18n">Parameters</h3>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
              <!-- SLD controls -->
              <div id="SLDsliders">
              </div>
            </div>
          </div>
        </div>
      </div>
      <!-- share panel -->
      <div id="panelShareModal" class="modal fade" tabindex="-1">
        <div class="modal-dialog modal-lg">
          <div class="modal-content">
            <div class="modal-header">
              <h3 class="modal-title i18n">Map</h3>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
              <div class="mb-3">
                <label for="setTitle" class="form-label i18n">Title</label>
                <input type="text" name="setTitle" id="setTitle" class="form-control i18n" value="" placeholder="change title">
              </div>
              <div class="row">
                <div class="col-md-6">
                  <!-- social links -->
                  <div id="socialLinks" class="mb-3"></div>
                  <!-- to georchestra viewer -->
                  <form id="georchestraForm" target="_blank" method="post" action="">
                    <input type="hidden" id="georchestraFormData" name="data" value="">
                    <input type="submit" class="i18n btn btn-primary w-100" title="Edit with geOrchestra" value="geOrchestra">
                  </form>
                </div>
                <!-- QR code -->
                <div class="col-md-6">
                  <div class="sv-permalink-wrap">
                    <a id="permalink" class="i18n btn btn-secondary d-block mb-3" data-ajax="false" href="#" title="Permalink to this map">Permalink</a>
                    <div id="qrcode"></div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
  </body>
</html>
