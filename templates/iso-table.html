<table class="sv-md-iso">
  <tbody>
    {{#date}}
    <tr><th>{{dateLabel}}</th><td>{{date}}</td></tr>
    {{/date}}
    {{#producer}}
    <tr><th>{{producerLabel}}</th><td>{{producer}}</td></tr>
    {{/producer}}
    {{#email}}
    <tr><th>{{contactLabel}}</th><td><a href="mailto:{{email}}">{{email}}</a></td></tr>
    {{/email}}
    {{#licenceText}}
    <tr>
      <th>{{licenceLabel}}</th>
      <td>
        {{#licenceUrl}}<a href="{{licenceUrl}}" target="_blank" rel="noopener noreferrer">{{licenceText}}</a>{{/licenceUrl}}
        {{^licenceUrl}}{{licenceText}}{{/licenceUrl}}
      </td>
    </tr>
    {{/licenceText}}
  </tbody>
</table>
