# sViewer — nginx server{} context snippet
#
# Usage: include inside a server{} block, e.g.:
#
#   server {
#       listen 80;
#       root /var/www/html;
#       ...
#       include /path/to/sviewer/etc/nginx-server.conf;
#   }
#
# nginx add_header inheritance caveat: a location block that defines ANY
# add_header drops ALL add_header directives from the parent server block for
# that location. A single catch-all location avoids the duplication problem.
#
# Prerequisites:
#   - ngx_http_headers_module (standard)

# --- sViewer -----------------------------------------------------------
#
# Path allowlist strategy: only explicitly whitelisted directories and files
# are served. Everything else (node_modules/, scripts/, CLAUDE.md, etc.) gets
# 404 — never falls through to index.html.
#
# Allowlisted public paths:
#   /sviewer/index.html          — app entry point
#   /sviewer/js/                 — sviewer.js, embed.js, sviewer.min.js
#   /sviewer/css/                — sviewer.css, sviewer.min.css
#   /sviewer/build/              — ol-new.js (OL bundle)
#   /sviewer/lib/                — proj4, jquery, bootstrap (self-hosted)
#   /sviewer/etc/                — customConfig.js, i18n.js (public by design)
#   /sviewer/templates/          — HTML templates loaded by embed.js
#   /sviewer/img/                — icons, logo
#   /sviewer/examples/           — demo pages and sample data
#   /sviewer/integrations/       — Grist widget and future integrations
#   /sviewer/manifest.json       — PWA manifest
#   /sviewer/sw.js               — service worker

# Deny sensitive paths — ^~ prevents regex locations from overriding these
location ^~ /sviewer/node_modules/   { return 404; }
location ^~ /sviewer/scripts/        { return 404; }
location ^~ /sviewer/.               { return 404; }

# Deny sensitive files by regex — ~* = case-insensitive
# Listed explicitly: no pattern creep, easy to audit
location ~* ^/sviewer/(CLAUDE|CREDITS|CHANGELOG|TECHNICAL|README|Dockerfile|package(-lock)?\.json|postcss\.config\.js|build/ol-custom-entry\.js)(\..*)?$ {
    return 404;
}

# Deny dotfiles and backup extensions anywhere under /sviewer/
location ~* ^/sviewer/.*\.(bak|orig|log|sh|py|rb|pl|md)$ {
    return 404;
}

# Grist widget — relaxed CSP: needs external grist-plugin-api.js + inline script
# Covers both /sviewer/integrations/grist/ and explicit index.html URL
location = /sviewer/integrations/grist/ {
    index index.html;
    try_files $uri/index.html =404;
    add_header X-Content-Type-Options "nosniff"                        always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy
        "default-src 'none'; script-src 'self' https://docs.getgrist.com 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https:; base-uri 'self'; form-action 'none'; frame-ancestors https://docs.getgrist.com https://*.getgrist.com; upgrade-insecure-requests;"
        always;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Vary "Accept-Encoding";
}
location = /sviewer/integrations/grist/index.html {
    try_files $uri =404;
    add_header X-Content-Type-Options "nosniff"                        always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy
        "default-src 'none'; script-src 'self' https://docs.getgrist.com 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https:; base-uri 'self'; form-action 'none'; frame-ancestors https://docs.getgrist.com https://*.getgrist.com; upgrade-insecure-requests;"
        always;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Vary "Accept-Encoding";
}

# Main sViewer location — allowlisted paths only
location /sviewer/ {
    # Try exact file, then directory index, then 404.
    # No SPA fallback — unknown paths get 404, not index.html.
    index index.html;
    try_files $uri $uri/index.html =404;

    # Security headers
    #
    # X-Frame-Options absent: sviewer is designed to be embedded in
    # third-party pages. Framing restrictions are the host page's
    # responsibility. Uncomment if serving standalone only:
    # add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff"                        always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # Content Security Policy
    #
    # script-src 'self'          — all JS is local, no CDN, no inline scripts
    # style-src  'unsafe-inline' — required: element.style in embed.js,
    #                              inline style attributes in templates/QR code
    # img-src    data: https:    — data: for QR PNG; https: for WMS tiles and
    #                              legends from user-configured WMS servers
    # connect-src https:         — WMS/WFS endpoints are user-configured and
    #                              cannot be statically whitelisted
    # font-src   'self'          — bootstrap-icons.subset.woff2 only
    # frame-ancestors *          — allow embedding from any origin (embed mode)
    add_header Content-Security-Policy
        "default-src 'none'; script-src 'self' 'sha256-r7U78s6wGEjzP3t+6hO+XvJH0G4a5oCLNg2tLcfhvOk='; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https:; manifest-src 'self'; base-uri 'self'; form-action 'none'; frame-ancestors *; upgrade-insecure-requests;"
        always;

    # Cache strategy: immutable libs/build assets get 1 year; everything else
    # revalidates. A map expression selects the right Cache-Control per path.
    #
    # lib/ and build/ are fingerprinted or versioned — safe to cache forever.
    # js/, css/, templates/, etc/ change with deployments — short TTL.
    # index.html must never be cached (it bootstraps the whole app).
    set $cc "public, max-age=3600, must-revalidate";
    if ($uri ~* "^/sviewer/(lib|build)/") { set $cc "public, max-age=31536000, immutable"; }
    if ($uri = "/sviewer/index.html")     { set $cc "no-cache, no-store, must-revalidate"; }
    add_header Cache-Control $cc;
    add_header Vary "Accept-Encoding";
}
