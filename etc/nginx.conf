# nginx reverse proxy configuration for sViewer
# Optimized for performance: compression, caching, HTTP/2
#
# Usage: include this file from your main nginx server block, or adapt to your
# virtual host setup. Assumes sViewer is served from a dedicated location.
#
# Prerequisites on the nginx server:
#   - ngx_http_gzip_module (standard)
#   - ngx_http_headers_module (standard)
#   - ngx_http_brotli_module (optional, google/ngx_brotli — better than gzip)

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name sviewer.example.org;

    # --- TLS ---------------------------------------------------------------
    ssl_certificate     /etc/ssl/certs/sviewer.example.org.crt;
    ssl_certificate_key /etc/ssl/private/sviewer.example.org.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    # HSTS (uncomment once HTTPS is confirmed stable)
    # add_header Strict-Transport-Security "max-age=63072000" always;

    # --- Compression -------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/html
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml
        font/woff2
        application/xml
        text/xml;

    # If ngx_http_brotli_module is available, prefer it over gzip:
    # brotli on;
    # brotli_comp_level 6;
    # brotli_types text/html text/css text/javascript application/javascript
    #              application/json image/svg+xml font/woff2;

    # --- Static asset root -------------------------------------------------
    root /usr/share/nginx/html;
    index index.html;

    # --- Security headers --------------------------------------------------
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # CSP: adjust 'connect-src' to include your GeoServer and any WMS hosts
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https:; font-src 'self';" always;

    # --- Immutable assets: versioned libs (long TTL) -----------------------
    # These files never change in-place: a new version means a new filename
    # or path. Safe to cache for 1 year with immutable directive.
    location ~* ^/sviewer/lib/.+\.(js|css|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Vary "Accept-Encoding";
        access_log off;
    }

    # Bootstrap Icons font (served from lib/bootstrap-icons/fonts/)
    location ~* \.woff2$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # --- Versioned app JS/CSS (fingerprinted builds) -----------------------
    # build/ output from minify.sh — filename contains a hash
    location ~* ^/sviewer/build/.+\.(js|css)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Vary "Accept-Encoding";
        access_log off;
    }

    # --- App JS/CSS (no fingerprint — moderate TTL + must-revalidate) ------
    # embed.js and sviewer.js are loaded by reference without hash.
    # Short TTL so updates are picked up quickly, but still benefit from
    # conditional GET (304 on unchanged files).
    location ~* ^/sviewer/js/.+\.js$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600, must-revalidate";
        add_header Vary "Accept-Encoding";
    }

    location ~* ^/sviewer/css/.+\.css$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600, must-revalidate";
        add_header Vary "Accept-Encoding";
    }

    # --- Mustache templates (fetched at runtime by loadTemplates) ----------
    # Small HTML fragments fetched via fetch() on init. Same short TTL as JS.
    location ~* ^/sviewer/templates/.+\.html$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600, must-revalidate";
        add_header Vary "Accept-Encoding";
    }

    # --- i18n and config (change with deployments) -------------------------
    location ~* ^/sviewer/etc/.+\.js$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600, must-revalidate";
    }

    # --- Images (icons, legend fallbacks) ----------------------------------
    location ~* \.(png|ico|svg|webp)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        access_log off;
    }

    # --- PWA manifest ------------------------------------------------------
    location = /sviewer/manifest.json {
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    # --- index.html: never cache (entry point, must always be fresh) -------
    location = /sviewer/index.html {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # --- Catch-all for the app ---------------------------------------------
    location /sviewer/ {
        try_files $uri $uri/ /sviewer/index.html;
    }

    # Redirect HTTP to HTTPS
    # (put in a separate server block listening on port 80)
}

server {
    listen 80;
    listen [::]:80;
    server_name sviewer.example.org;
    return 301 https://$host$request_uri;
}
