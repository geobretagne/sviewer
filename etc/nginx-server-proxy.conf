# sViewer — nginx server{} context snippet (reverse-proxy variant)
#
# Use this file when nginx fronts a backend that serves sViewer.
# The backend does NOT need its own sViewer snippet — security is enforced here.
#
# Usage: include inside a server{} block, e.g.:
#
#   server {
#       listen 443 ssl;
#       ...
#       include /path/to/sviewer/etc/nginx-server-proxy.conf;
#   }
#
# To adapt to a different path or backend, replace /sviewer2 and
# http://geob-vprod01:8080 throughout this file.
#
# Prerequisites:
#   - ngx_http_headers_module  (standard)
#   - ngx_http_proxy_module    (standard)

# --- sViewer (proxy) -------------------------------------------------------
#
# Path allowlist strategy: only explicitly whitelisted paths are proxied.
# Everything else returns 404 here — never forwarded to backend.

# Deny sensitive paths — ^~ prevents regex locations from matching these
location ^~ /sviewer2/node_modules/  { return 404; }
location ^~ /sviewer2/scripts/       { return 404; }
location ^~ /sviewer2/.              { return 404; }

# Deny sensitive files by regex
location ~* ^/sviewer2/(CLAUDE|CREDITS|CHANGELOG|TECHNICAL|README|Dockerfile|package(-lock)?\.json|postcss\.config\.js|build/ol-custom-entry\.js)(\..*)?$ {
    return 404;
}

# Deny dotfiles and backup extensions
location ~* ^/sviewer2/.*\.(bak|orig|log|sh|py|rb|pl|md)$ {
    return 404;
}

# Grist widget — relaxed CSP (external grist-plugin-api.js + unsafe-inline/eval)
location ~* ^/sviewer2/connectors/grist/(index\.html)?$ {
    proxy_pass       http://geob-vprod01:8080;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    add_header X-Content-Type-Options "nosniff"                        always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy
        "default-src 'none'; script-src 'self' https://docs.getgrist.com 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https:; base-uri 'self'; form-action 'none'; frame-ancestors *; upgrade-insecure-requests;"
        always;
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header Vary "Accept-Encoding" always;
}

# Main sViewer location — proxy all allowlisted paths
location /sviewer2/ {
    proxy_pass       http://geob-vprod01:8080;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    add_header X-Content-Type-Options "nosniff"                        always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy
        "default-src 'none'; script-src 'self' 'sha256-yuoFDDn9NB/z/U7Xv57M55yNL6My5j/eu4kMXAWNmUU=' 'sha256-wnylQc7kal79rLIZpYxNS9cGvALWsA+k/xK3L7I4xVw='; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https:; manifest-src 'self'; base-uri 'self'; form-action 'none'; frame-ancestors *; upgrade-insecure-requests;"
        always;

    set $cc "public, max-age=3600, must-revalidate";
    if ($uri ~* "^/sviewer2/(lib|build)/")      { set $cc "public, max-age=31536000, immutable"; }
    if ($uri ~* "^/sviewer2/(index\.html)?$")   { set $cc "no-cache, no-store, must-revalidate"; }
    if ($uri ~* "^/sviewer2/connectors/")       { set $cc "no-cache, no-store, must-revalidate"; }
    add_header Cache-Control $cc always;
    add_header Vary "Accept-Encoding" always;
}
