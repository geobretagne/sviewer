# sViewer — nginx http{} context snippet
#
# Usage: include inside the http{} block (NOT server{}), e.g.:
#
#   http {
#       ...
#       include /path/to/sviewer/etc/nginx-http.conf;
#   }
#
# Prerequisites:
#   - ngx_http_gzip_module    (standard)
#   - ngx_http_brotli_module  (optional — better compression than gzip)

# --- Compression -------------------------------------------------------
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_types
    text/html
    text/css
    text/javascript
    application/javascript
    application/json
    image/svg+xml
    font/woff2
    application/xml
    text/xml;

# brotli on;
# brotli_comp_level 6;
# brotli_types text/html text/css text/javascript application/javascript
#              application/json image/svg+xml font/woff2;
