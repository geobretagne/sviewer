<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>sViewer Blueprint</title>
    <style>
        :root {
            --bg:         #fff;
            --bg-panel:   #f5f5f5;
            --bg-input:   #fff;
            --border:     #ddd;
            --border-in:  #bbb;
            --text:       #333;
            --text-muted: #666;
            --text-label: #555;
            --accent:     #2c7be5;
            --accent-hov: #1a66d2;
            --bar-bg:     #1e2d3d;
            --bar-text:   #e8f0fe;
            --bar-url:    #a8c4f0;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg:         #1a1a1a;
                --bg-panel:   #252525;
                --bg-input:   #2a2a2a;
                --border:     #444;
                --border-in:  #555;
                --text:       #e8e8e8;
                --text-muted: #aaa;
                --text-label: #bbb;
                --accent:     #5b9cf6;
                --accent-hov: #3a80f0;
                --bar-bg:     #111820;
                --bar-text:   #c8d8f0;
                --bar-url:    #7aaae8;
            }
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: system-ui, sans-serif;
            font-size: 14px;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* ── Header ── */
        #bp-header {
            display: flex;
            align-items: baseline;
            gap: 12px;
            padding: 10px 16px 8px;
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        #bp-header h1 { font-size: 18px; font-weight: 700; letter-spacing: -.3px; }
        #bp-header p  { font-size: 12px; color: var(--text-muted); }

        /* ── Main split ── */
        #bp-main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ── Form panel ── */
        #bp-form {
            width: 380px;
            flex-shrink: 0;
            overflow-y: auto;
            padding: 14px 16px 80px; /* 80px = sticky bar height */
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        /* ── Preview panel ── */
        #bp-preview {
            flex: 1;
            position: relative;
        }
        #bp-iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* ── Section ── */
        .bp-section { display: flex; flex-direction: column; gap: 8px; }
        .bp-section-title {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .6px;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
            padding-bottom: 4px;
        }

        /* ── Field ── */
        .bp-field { display: flex; flex-direction: column; gap: 3px; }
        .bp-field label { font-size: 12px; color: var(--text-label); font-weight: 500; }
        .bp-field input[type="text"],
        .bp-field input[type="number"],
        .bp-field input[type="url"],
        .bp-field select {
            width: 100%;
            padding: 5px 8px;
            font-size: 13px;
            border: 1px solid var(--border-in);
            border-radius: 4px;
            background: var(--bg-input);
            color: var(--text);
            outline: none;
        }
        .bp-field input:focus,
        .bp-field select:focus { border-color: var(--accent); }
        .bp-field input:disabled,
        .bp-field select:disabled { opacity: .4; cursor: not-allowed; }
        .bp-field input.bp-error { border-color: #d9534f; }
        .bp-field input.bp-ok { border-color: #5cb85c; }
        .bp-error-msg { font-size: 11px; color: #d9534f; display: none; }
        .bp-ok-msg    { font-size: 11px; color: #5cb85c; display: none; }
        .bp-field input.bp-error + .bp-error-msg,
        .bp-error-msg.bp-visible { display: block; }
        .bp-ok-msg.bp-visible { display: block; }

        .bp-field input[type="range"] { width: 100%; accent-color: var(--accent); }

        .bp-row { display: flex; gap: 8px; }
        .bp-row .bp-field { flex: 1; }

        /* ── Inline button row ── */
        .bp-btn-row { display: flex; gap: 6px; }

        /* ── Buttons ── */
        .bp-btn {
            padding: 5px 12px;
            font-size: 13px;
            border: 1px solid var(--border-in);
            border-radius: 4px;
            background: var(--bg-input);
            color: var(--text);
            cursor: pointer;
            white-space: nowrap;
        }
        .bp-btn:hover { border-color: var(--accent); color: var(--accent); }
        .bp-btn-primary {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
            font-weight: 600;
        }
        .bp-btn-primary:hover { background: var(--accent-hov); border-color: var(--accent-hov); color: #fff; }

        /* ── Checkbox row ── */
        .bp-check { display: flex; align-items: center; gap: 6px; font-size: 13px; }
        .bp-check input { accent-color: var(--accent); width: 14px; height: 14px; cursor: pointer; }
        .bp-check label { cursor: pointer; color: var(--text); }

        /* ── Opacity label ── */
        .bp-opacity-row { display: flex; align-items: center; gap: 8px; }
        .bp-opacity-row input[type="range"] { flex: 1; }
        #bp-opacity-val { font-size: 12px; color: var(--text-muted); min-width: 28px; text-align: right; }

        /* ── Ext autocomplete ── */
        .bp-ac-wrap { position: relative; }
        #bp-ac-list {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--bg-input);
            border: 1px solid var(--accent);
            border-top: none;
            border-radius: 0 0 4px 4px;
            z-index: 200;
            max-height: 220px;
            overflow-y: auto;
        }
        #bp-ac-list.bp-ac-open { display: block; }
        .bp-ac-item {
            padding: 6px 8px;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            font-size: 12px;
        }
        .bp-ac-item:last-child { border-bottom: none; }
        .bp-ac-item:hover, .bp-ac-item[aria-selected="true"] {
            background: var(--accent);
            color: #fff;
        }
        .bp-ac-item-name { font-weight: 600; }
        .bp-ac-item-desc { color: var(--text-muted); font-size: 11px; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .bp-ac-item:hover .bp-ac-item-desc,
        .bp-ac-item[aria-selected="true"] .bp-ac-item-desc { color: rgba(255,255,255,.8); }

        /* ── Sticky bottom bar ── */
        #bp-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 380px;
            background: var(--bar-bg);
            color: var(--bar-text);
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 100;
            border-top: 1px solid rgba(255,255,255,.1);
        }
        #bp-url-display {
            flex: 1;
            font-size: 11px;
            font-family: monospace;
            color: var(--bar-url);
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            text-decoration: none;
        }
        #bp-url-display:hover { text-decoration: underline; color: #fff; }
        #bp-bar .bp-btn {
            background: transparent;
            border-color: rgba(255,255,255,.25);
            color: var(--bar-text);
            font-size: 12px;
            padding: 4px 10px;
        }
        #bp-bar .bp-btn:hover { border-color: rgba(255,255,255,.6); color: #fff; }
        #bp-bar .bp-btn-primary {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }
        #bp-bar .bp-btn-primary:hover { background: var(--accent-hov); }
    #bp-url-open { color: var(--bar-url); font-size: 14px; flex-shrink: 0; text-decoration: none; line-height: 1; }
    #bp-url-open:hover { color: #fff; }
    #bp-platform { padding: 8px 14px; background: var(--bg-panel); border-bottom: 1px solid var(--border); font-size: 12px; color: var(--text-muted); }
    #bp-platform a { color: var(--accent); text-decoration: none; font-weight: 600; }
    #bp-platform a:hover { text-decoration: underline; }
    </style>
    <link rel="stylesheet" href="../../static/fonts/bootstrap-icons.subset.css">
</head>
<body>

<!-- Header -->
<div id="bp-header">
    <h1 id="bp-title-h1">Blueprint</h1>
    <p id="bp-subtitle"></p>
</div>

<!-- Main split -->
<div id="bp-main">

    <!-- Form -->
    <div id="bp-form">

        <!-- Platform info -->
        <div id="bp-platform" style="display:none">
            <span id="bp-platform-label"></span>
            <a id="bp-platform-url" href="#" target="_blank" rel="noopener"></a>
        </div>

        <!-- Load existing URL -->
        <div class="bp-section">
            <div class="bp-section-title" id="bp-s-load"></div>
            <div class="bp-field">
                <label for="bp-load-input" id="bp-lbl-load-url"></label>
                <input type="url" id="bp-load-input" autocomplete="off">
            </div>
            <div class="bp-btn-row">
                <button class="bp-btn bp-btn-primary" id="bp-btn-load"></button>
            </div>
        </div>

        <!-- Position -->
        <div class="bp-section">
            <div class="bp-section-title" id="bp-s-position"></div>
            <div class="bp-row">
                <div class="bp-field">
                    <label for="bp-x" id="bp-lbl-x"></label>
                    <input type="number" id="bp-x" step="any" placeholder="2.3488">
                </div>
                <div class="bp-field">
                    <label for="bp-y" id="bp-lbl-y"></label>
                    <input type="number" id="bp-y" step="any" placeholder="48.8534">
                </div>
                <div class="bp-field" style="max-width:70px">
                    <label for="bp-z" id="bp-lbl-z"></label>
                    <input type="number" id="bp-z" step="1" min="1" max="20" placeholder="12">
                </div>
            </div>
            <div class="bp-btn-row">
                <button class="bp-btn" id="bp-btn-capture"></button>
            </div>
        </div>

        <!-- WMS layer 1 -->
        <div class="bp-section">
            <div class="bp-section-title" id="bp-s-layer1"></div>
            <div class="bp-field">
                <label for="bp-wms-url" id="bp-lbl-wms-url"></label>
                <input type="url" id="bp-wms-url" autocomplete="off">
                <span class="bp-error-msg" id="bp-err-wms-url"></span>
                <span class="bp-ok-msg" id="bp-ok-wms-url"></span>
            </div>
            <div class="bp-field">
                <label for="bp-layer-name" id="bp-lbl-layer-name"></label>
                <div class="bp-ac-wrap">
                    <input type="text" id="bp-layer-name" autocomplete="off" aria-autocomplete="list" aria-controls="bp-layer-ac-list" aria-expanded="false">
                    <ul id="bp-layer-ac-list" role="listbox"></ul>
                </div>
                <span class="bp-error-msg" id="bp-err-layer-name"></span>
                <span class="bp-ok-msg" id="bp-ok-layer-name"></span>
            </div>
            <div class="bp-field">
                <label for="bp-md" id="bp-lbl-md"></label>
                <input type="text" id="bp-md" autocomplete="off">
                <span class="bp-error-msg" id="bp-err-md"></span>
                <span class="bp-ok-msg" id="bp-ok-md"></span>
            </div>
        </div>

        <!-- Layer 1 advanced options -->
        <div class="bp-section">
            <div class="bp-section-title" id="bp-s-layeropts"></div>
            <div class="bp-field">
                <label for="bp-style" id="bp-lbl-style"></label>
                <input type="text" id="bp-style" autocomplete="off">
            </div>
            <div class="bp-field">
                <label for="bp-cql" id="bp-lbl-cql"></label>
                <input type="text" id="bp-cql" autocomplete="off" spellcheck="false">
            </div>
            <div class="bp-field">
                <label id="bp-lbl-opacity"></label>
                <div class="bp-opacity-row">
                    <input type="range" id="bp-opacity" min="0" max="1" step="0.1" value="1">
                    <span id="bp-opacity-val">1</span>
                </div>
            </div>
        </div>

        <!-- GeoJSON -->
        <div class="bp-section">
            <div class="bp-section-title" id="bp-s-geojson"></div>
            <div class="bp-field">
                <label for="bp-geojson" id="bp-lbl-geojson"></label>
                <input type="url" id="bp-geojson" autocomplete="off">
                <span class="bp-error-msg" id="bp-err-geojson"></span>
                <span class="bp-ok-msg" id="bp-ok-geojson"></span>
            </div>
            <div class="bp-field">
                <label for="bp-label" id="bp-lbl-label"></label>
                <input type="text" id="bp-label" autocomplete="off">
            </div>
        </div>

        <!-- App options -->
        <div class="bp-section">
            <div class="bp-section-title" id="bp-s-app"></div>
            <div class="bp-field">
                <label for="bp-title-input" id="bp-lbl-title"></label>
                <input type="text" id="bp-title-input">
            </div>
            <div class="bp-check">
                <input type="checkbox" id="bp-q">
                <label for="bp-q" id="bp-lbl-q"></label>
            </div>
            <div class="bp-check">
                <input type="checkbox" id="bp-s">
                <label for="bp-s" id="bp-lbl-s"></label>
            </div>
            <div class="bp-row">
                <div class="bp-field">
                    <label for="bp-lb" id="bp-lbl-basemap"></label>
                    <select id="bp-lb"></select>
                </div>
                <div class="bp-field">
                    <label for="bp-ext" id="bp-lbl-ext"></label>
                    <div class="bp-ac-wrap">
                        <input type="text" id="bp-ext" autocomplete="off" aria-autocomplete="list" aria-controls="bp-ac-list" aria-expanded="false">
                        <ul id="bp-ac-list" role="listbox" aria-label="Extensions disponibles"></ul>
                    </div>
                </div>
            </div>
            <div class="bp-row">
                <div class="bp-field">
                    <label for="bp-theme" id="bp-lbl-theme"></label>
                    <select id="bp-theme">
                        <option value="" id="bp-theme-auto"></option>
                        <option value="dark" id="bp-theme-dark"></option>
                        <option value="light" id="bp-theme-light"></option>
                    </select>
                </div>
                <div class="bp-field">
                    <label for="bp-lang" id="bp-lbl-lang"></label>
                    <select id="bp-lang">
                        <option value="" id="bp-lang-auto"></option>
                        <option value="fr">Français</option>
                        <option value="en">English</option>
                        <option value="es">Español</option>
                        <option value="de">Deutsch</option>
                    </select>
                </div>
            </div>
        </div>

    </div><!-- /bp-form -->

    <!-- Preview iframe -->
    <div id="bp-preview">
        <iframe id="bp-iframe" src="" title="sViewer preview"></iframe>
    </div>

</div><!-- /bp-main -->

<!-- Sticky bottom bar -->
<div id="bp-bar">
    <a id="bp-url-display" href="#" target="_blank" rel="noopener"></a>
    <a id="bp-url-open" href="#" target="_blank" rel="noopener" title="Ouvrir dans sViewer"><i class="bi bi-box-arrow-up-right"></i></a>
    <button class="bp-btn bp-btn-primary" id="bp-btn-preview"></button>
    <button class="bp-btn" id="bp-btn-copy"></button>
    <button class="bp-btn" id="bp-btn-reset"></button>
</div>

<script>
(function () {
    'use strict';

    /* ── i18n ── */
    var _i18n = {};
    var _lang = (navigator.language || 'fr').split('-')[0];
    if (!['fr','en','es','de'].includes(_lang)) { _lang = 'fr'; }

    function t(key) { return (_i18n[_lang] && _i18n[_lang][key]) || (_i18n['fr'] && _i18n['fr'][key]) || key; }

    function applyI18n() {
        document.documentElement.lang = _lang;
        document.title                        = t('page.title');
        document.getElementById('bp-title-h1').textContent  = t('app.title');
        document.getElementById('bp-subtitle').textContent  = t('app.subtitle');
        document.getElementById('bp-s-load').textContent    = t('section.load');
        document.getElementById('bp-s-position').textContent = t('section.position');
        document.getElementById('bp-s-layer1').textContent  = t('section.layer1');
        document.getElementById('bp-s-layeropts').textContent = t('section.layeropts');
        document.getElementById('bp-s-app').textContent     = t('section.app');
        document.getElementById('bp-lbl-load-url').textContent  = t('label.load_url');
        document.getElementById('bp-btn-load').textContent       = t('btn.load');
        document.getElementById('bp-lbl-x').textContent          = t('label.x');
        document.getElementById('bp-lbl-y').textContent          = t('label.y');
        document.getElementById('bp-lbl-z').textContent          = t('label.z');
        document.getElementById('bp-btn-capture').textContent    = t('btn.capture');
        document.getElementById('bp-lbl-wms-url').textContent    = t('label.wms_url');
        document.getElementById('bp-lbl-layer-name').textContent = t('label.layer_name');
        document.getElementById('bp-lbl-style').textContent      = t('label.style');
        document.getElementById('bp-lbl-cql').textContent        = t('label.cql');
        document.getElementById('bp-cql').placeholder            = t('hint.cql');
        document.getElementById('bp-lbl-opacity').textContent    = t('label.opacity');
        document.getElementById('bp-lbl-q').textContent          = t('label.q');
        document.getElementById('bp-lbl-title').textContent      = t('label.title');
        document.getElementById('bp-lbl-basemap').textContent    = t('label.basemap');
        document.getElementById('bp-lbl-ext').textContent        = t('label.ext');
        document.getElementById('bp-btn-preview').textContent    = t('btn.preview');
        document.getElementById('bp-btn-copy').textContent       = t('btn.copy');
        document.getElementById('bp-btn-reset').textContent      = t('btn.reset');
        document.getElementById('bp-load-input').placeholder     = t('hint.load_url');
        document.getElementById('bp-wms-url').placeholder        = t('hint.wms_url');
        document.getElementById('bp-layer-name').placeholder     = t('hint.layer_name');
        document.getElementById('bp-style').placeholder          = t('hint.style');
        document.getElementById('bp-title-input').placeholder    = t('hint.title');
        document.getElementById('bp-ext').placeholder            = t('hint.ext');
        document.getElementById('bp-lbl-md').textContent         = t('label.md');
        document.getElementById('bp-md').placeholder             = t('hint.md');
        document.getElementById('bp-s-geojson').textContent      = t('section.geojson');
        document.getElementById('bp-lbl-geojson').textContent    = t('label.geojson');
        document.getElementById('bp-geojson').placeholder        = t('hint.geojson');
        document.getElementById('bp-lbl-label').textContent      = t('label.label');
        document.getElementById('bp-label').placeholder          = t('hint.label');
        document.getElementById('bp-lbl-theme').textContent      = t('label.theme');
        document.getElementById('bp-theme-auto').textContent     = t('theme.auto');
        document.getElementById('bp-theme-dark').textContent     = t('theme.dark');
        document.getElementById('bp-theme-light').textContent    = t('theme.light');
        document.getElementById('bp-lbl-lang').textContent       = t('label.lang');
        document.getElementById('bp-lang-auto').textContent      = t('lang.auto');
        document.getElementById('bp-lbl-s').textContent          = t('label.s');
    }

    /* ── sViewer base URL — derived from page location, not currentScript (inline script) ── */
    var _base = (function () {
        var href = window.location.href.split('?')[0];
        /* ensure trailing slash so regex anchors correctly */
        if (!href.endsWith('/')) { href += '/'; }
        var m = href.match(/^(.*\/)ext\/blueprint\/$/);
        if (m) { return m[1]; }
        /* fallback: walk up two levels from current path */
        return new URL('../../', window.location.href).href;
    }());

    /* ── buildUrl ── */
    function buildUrl() {
        var p = new URLSearchParams();

        var x    = document.getElementById('bp-x').value.trim();
        var y    = document.getElementById('bp-y').value.trim();
        var z    = document.getElementById('bp-z').value.trim();
        if (x) { p.set('x', x); }
        if (y) { p.set('y', y); }
        if (z) { p.set('z', z); }

        var wmsUrl    = document.getElementById('bp-wms-url').value.trim();
        var layerName = document.getElementById('bp-layer-name').value.trim();
        if (layerName) {
            var style   = document.getElementById('bp-style').value.trim();
            var cql     = document.getElementById('bp-cql').value.trim();
            var opacity = document.getElementById('bp-opacity').value;
            /* sViewer layers= format: layername[*style[*cql_filter]][@wmsurl] */
            /* cql without style: emit empty style slot so position is unambiguous */
            var layerPart = layerName;
            if (style || cql) { layerPart += '*' + style; }
            if (cql)          { layerPart += '*' + cql; }
            p.set('layers', wmsUrl ? layerPart + '@' + wmsUrl : layerPart);
            if (opacity !== '1') { p.set('opacity', opacity); }
        }


        var title = document.getElementById('bp-title-input').value.trim();
        if (title) { p.set('title', title); }

        var lb = document.getElementById('bp-lb').value.trim();
        if (lb !== '' && lb !== '0') { p.set('lb', lb); }

        var ext = document.getElementById('bp-ext').value.trim();
        if (ext) { p.set('ext', ext); }

        var md = document.getElementById('bp-md').value.trim();
        if (md) { p.set('md', md); }

        var geojson = document.getElementById('bp-geojson').value.trim();
        if (geojson) { p.set('geojson', geojson); }

        var label = document.getElementById('bp-label').value.trim();
        if (label) { p.set('label', label); }

        var theme = document.getElementById('bp-theme').value;
        if (theme) { p.set('theme', theme); }

        var lang = document.getElementById('bp-lang').value;
        if (lang) { p.set('lang', lang); }

        if (document.getElementById('bp-q').checked) { p.set('q', '1'); }
        if (document.getElementById('bp-s').checked) { p.set('s', '1'); }

        var qs = p.toString();
        return _base + 'index.html' + (qs ? '?' + qs : '');
    }

    /* ── parseUrl ── */
    function parseUrl(url) {
        var qs;
        try {
            var u = new URL(url, window.location.href);
            qs = u.searchParams;
        } catch (e) { return false; }

        document.getElementById('bp-x').value = qs.get('x') || '';
        document.getElementById('bp-y').value = qs.get('y') || '';
        document.getElementById('bp-z').value = qs.get('z') || '';

        /* layers= format: layername[*style[*cql_filter]]@wmsurl */
        var layers = qs.get('layers') || '';
        if (layers) {
            var atIdx = layers.lastIndexOf('@');
            var layerPart = atIdx > 0 ? layers.substring(0, atIdx) : layers;
            var wmsUrlParsed = atIdx > 0 ? layers.substring(atIdx + 1) : '';
            var starParts = layerPart.split('*');
            document.getElementById('bp-layer-name').value = starParts[0] || '';
            document.getElementById('bp-style').value      = starParts[1] || '';
            document.getElementById('bp-cql').value        = starParts[2] || '';
            document.getElementById('bp-wms-url').value    = wmsUrlParsed;
            var op = qs.get('opacity');
            document.getElementById('bp-opacity').value = (op !== null && op !== '') ? op : '1';
            document.getElementById('bp-opacity-val').textContent = document.getElementById('bp-opacity').value;
        }

        document.getElementById('bp-title-input').value = qs.get('title') || '';
        document.getElementById('bp-lb').value          = qs.get('lb')    || '0';
        document.getElementById('bp-ext').value         = qs.get('ext')   || '';
        document.getElementById('bp-md').value          = qs.get('md')      || '';
        document.getElementById('bp-geojson').value     = qs.get('geojson') || '';
        document.getElementById('bp-label').value       = qs.get('label')   || '';
        document.getElementById('bp-theme').value       = qs.get('theme')   || '';
        document.getElementById('bp-lang').value        = qs.get('lang')    || '';
        document.getElementById('bp-q').checked         = qs.get('q') === '1';
        document.getElementById('bp-s').checked         = qs.get('s') === '1';
        return true;
    }

    /* ── CSW helpers (mirrors sviewer.js) ── */
    var _ISO_NS = { gmd:'http://www.isotc211.org/2005/gmd', gco:'http://www.isotc211.org/2005/gco', gmx:'http://www.isotc211.org/2005/gmx', xlink:'http://www.w3.org/1999/xlink' };
    function _isoNsResolver(p) { return _ISO_NS[p] || null; }
    function _isoXt(xmlDoc, node, xpath) {
        var n = xmlDoc.evaluate(xpath, node, _isoNsResolver, XPathResult.FIRST_ORDERED_NODE_TYPE, null).singleNodeValue;
        return n ? n.textContent.trim() : null;
    }
    function _parseCSWForWMS(xmlDoc) {
        var nodes = xmlDoc.evaluate('//gmd:distributionInfo//gmd:CI_OnlineResource',
            xmlDoc.documentElement, _isoNsResolver, XPathResult.ORDERED_NODE_SNAPSHOT_TYPE, null);
        for (var i = 0; i < nodes.snapshotLength; i++) {
            var node = nodes.snapshotItem(i);
            var proto    = _isoXt(xmlDoc, node, 'gmd:protocol/gco:CharacterString');
            var rawUrl   = _isoXt(xmlDoc, node, 'gmd:linkage/gmd:URL');
            var layername = _isoXt(xmlDoc, node, 'gmd:name/gco:CharacterString');
            if (proto === 'OGC:WMS' && rawUrl && layername) {
                var wmsUrl = rawUrl.indexOf('?') > 0 ? rawUrl.split('?')[0] : rawUrl;
                return { wmsUrl: wmsUrl, layername: layername };
            }
        }
        return null;
    }

    /* ── async URL probes ── */
    function _validateGeoJSONUrl(url, cb) {
        var el  = document.getElementById('bp-geojson');
        var err = document.getElementById('bp-err-geojson');
        el.classList.remove('bp-error');
        err.classList.remove('bp-visible');
        if (!url) { return; }
        try { new URL(url); } catch (e) { cb('err.geojson_invalid_url'); return; }
        if (!url.startsWith('https://')) { cb('err.geojson_invalid_url'); return; }
        fetch(url, { method: 'HEAD', mode: 'cors' })
            .then(function (r) {
                var ct = r.headers.get('content-type') || '';
                if (ct.indexOf('html') !== -1) { cb('err.geojson_not_json'); } else { cb(null); }
            })
            .catch(function () { cb('err.geojson_cors'); });
    }

    function _buildCapabilitiesProbeUrl(base) {
        var u = new URL(base);
        ['service','SERVICE','request','REQUEST','version','VERSION'].forEach(function (k) { u.searchParams.delete(k); });
        u.searchParams.set('SERVICE', 'WMS');
        u.searchParams.set('REQUEST', 'GetCapabilities');
        u.searchParams.set('VERSION', '1.3.0');
        return u.toString();
    }

    function _cleanWMSEndpoint(raw) {
        var u = new URL(raw);
        ['service','SERVICE','request','REQUEST','version','VERSION'].forEach(function (k) { u.searchParams.delete(k); });
        return u.toString();
    }

    function _probeCapabilities(probeUrl, cb) {
        /* headers-only probe — used for layer name validation */
        var ctrl = new AbortController();
        var done = false;
        fetch(probeUrl, { method: 'GET', mode: 'cors', signal: ctrl.signal })
            .then(function (r) {
                var ct = r.headers.get('content-type') || '';
                ctrl.abort();
                done = true;
                if (ct.indexOf('xml') !== -1 || ct.indexOf('text/plain') !== -1) { cb(null); }
                else { cb('err.wms_not_capabilities'); }
            })
            .catch(function (e) {
                if (done || e.name === 'AbortError') { return; }
                cb('err.wms_cors');
            });
    }

    function _parseWMSLayers(xmlDoc) {
        var layers = [];
        var nodes = xmlDoc.getElementsByTagName('Layer');
        for (var i = 0; i < nodes.length; i++) {
            var nameEl  = nodes[i].getElementsByTagName('Name')[0];
            var titleEl = nodes[i].getElementsByTagName('Title')[0];
            if (!nameEl) { continue; }
            var name  = nameEl.textContent.trim();
            var title = titleEl ? titleEl.textContent.trim() : '';
            if (name && layers.findIndex(function (l) { return l.name === name; }) === -1) {
                layers.push({ name: name, title: title });
            }
        }
        return layers;
    }

    var _wmsLayerCache = {}; /* endpoint → [{name, title}] */

    function _fetchCapabilitiesAndCache(probeUrl, cleanUrl, cb) {
        fetch(probeUrl, { mode: 'cors' })
            .then(function (r) {
                if (!r.ok) { throw new Error('HTTP ' + r.status); }
                var ct = r.headers.get('content-type') || '';
                if (ct.indexOf('xml') === -1 && ct.indexOf('text/plain') === -1) {
                    cb('err.wms_not_capabilities'); return r.text().then(function(){});
                }
                return r.text();
            })
            .then(function (text) {
                if (!text) { return; }
                var xmlDoc = new DOMParser().parseFromString(text, 'text/xml');
                _wmsLayerCache[cleanUrl] = _parseWMSLayers(xmlDoc);
                cb(null);
            })
            .catch(function () { cb('err.wms_cors'); });
    }

    function _validateWMSUrl(url, cb) {
        var el  = document.getElementById('bp-wms-url');
        var err = document.getElementById('bp-err-wms-url');
        el.classList.remove('bp-error');
        err.classList.remove('bp-visible');
        if (!url) { _wmsLayerCache = {}; return; }
        if (!url.startsWith('https://')) { cb('err.https_required'); return; }
        try { new URL(url); } catch (e) { cb('err.https_required'); return; }
        var cleanUrl  = _cleanWMSEndpoint(url);
        var probeUrl  = _buildCapabilitiesProbeUrl(url);
        _fetchCapabilitiesAndCache(probeUrl, cleanUrl, function (errKey) {
            if (!errKey) { el.value = cleanUrl; }
            cb(errKey);
        });
    }

    function _validateLayerName(layerName, cb) {
        /* only fires when no custom WMS URL — probes geOrchestra virtual endpoint */
        var el  = document.getElementById('bp-layer-name');
        var err = document.getElementById('bp-err-layer-name');
        el.classList.remove('bp-error');
        err.classList.remove('bp-visible');
        if (!layerName) { return; }
        if (!_geOrchestraBaseUrl) { cb(null); return; } /* no local service configured — skip */
        var parts = layerName.split('*')[0].split('@')[0]; /* strip style/cql/wmsurl suffixes */
        var colonIdx = parts.indexOf(':');
        if (colonIdx < 1) { cb('err.wms_namespace_required'); return; }
        var ns = encodeURIComponent(parts.substring(0, colonIdx));
        var ln = encodeURIComponent(parts.substring(colonIdx + 1));
        var endpoint = _geOrchestraBaseUrl + '/geoserver/' + ns + '/' + ln + '/wms';
        _probeCapabilities(_buildCapabilitiesProbeUrl(endpoint), function (errKey) {
            cb(errKey ? 'err.wms_layer_not_found' : null);
        });
    }

    function _validateMdUrl(val, cb) {
        var el  = document.getElementById('bp-md');
        var err = document.getElementById('bp-err-md');
        el.classList.remove('bp-error');
        err.classList.remove('bp-visible');
        if (!val) { return; }
        var cswBase = _geOrchestraBaseUrl + '/geonetwork/srv/eng/csw';
        var mdId = val;
        var atIdx = val.indexOf('@http');
        if (atIdx !== -1) { cswBase = val.slice(atIdx + 1); mdId = val.slice(0, atIdx); }
        if (!cswBase.startsWith('https://')) { cb('err.md_no_service'); return; }
        var url = cswBase + '?' + new URLSearchParams({
            SERVICE: 'CSW', VERSION: '2.0.2', REQUEST: 'GetRecordById',
            Id: mdId, ElementSetName: 'full',
            OutputSchema: 'http://www.isotc211.org/2005/gmd'
        });
        fetch(url, { mode: 'cors' })
            .then(function (r) {
                if (!r.ok) { throw new Error('HTTP ' + r.status); }
                return r.text();
            })
            .then(function (text) {
                var xmlDoc = new DOMParser().parseFromString(text, 'text/xml');
                if (xmlDoc.querySelector('parsererror')) { cb('err.md_not_found'); return; }
                var result;
                try { result = _parseCSWForWMS(xmlDoc); } catch (e) { cb('err.md_not_found'); return; }
                cb(result ? null : 'err.md_no_wms');
            })
            .catch(function () { cb('err.md_not_found'); });
    }

    function _showFieldError(inputId, errId, msgKey) {
        var el  = document.getElementById(inputId);
        var err = document.getElementById(errId);
        el.classList.remove('bp-ok');
        var okId = errId.replace('bp-err-', 'bp-ok-');
        var ok = document.getElementById(okId);
        if (ok) { ok.classList.remove('bp-visible'); }
        el.classList.add('bp-error');
        err.textContent = t(msgKey);
        err.classList.add('bp-visible');
    }

    function _showFieldOk(inputId, errId, msg) {
        var el  = document.getElementById(inputId);
        var err = document.getElementById(errId);
        el.classList.remove('bp-error');
        err.classList.remove('bp-visible');
        el.classList.add('bp-ok');
        var okId = errId.replace('bp-err-', 'bp-ok-');
        var ok = document.getElementById(okId);
        if (ok) { ok.textContent = msg; ok.classList.add('bp-visible'); }
    }

    /* ── validate — returns true if ok to preview ── */
    function validate() {
        var ok = true;
        var wmsEl  = document.getElementById('bp-wms-url');
        var nameEl = document.getElementById('bp-layer-name');
        var errWms  = document.getElementById('bp-err-wms-url');
        var errName = document.getElementById('bp-err-layer-name');

        /* clear */
        wmsEl.classList.remove('bp-error');
        nameEl.classList.remove('bp-error');
        errWms.classList.remove('bp-visible');
        errName.classList.remove('bp-visible');

        var wmsUrl    = wmsEl.value.trim();
        var layerName = nameEl.value.trim();

        if (wmsUrl && !wmsUrl.startsWith('https://')) {
            wmsEl.classList.add('bp-error');
            errWms.textContent = t('err.https_required');
            errWms.classList.add('bp-visible');
            ok = false;
        }
        if (wmsUrl && !layerName) {
            nameEl.classList.add('bp-error');
            errName.textContent = t('err.layer_required');
            errName.classList.add('bp-visible');
            ok = false;
        }
        if (errWms.classList.contains('bp-visible')) { ok = false; }
        if (errName.classList.contains('bp-visible')) { ok = false; }
        if (document.getElementById('bp-err-geojson').classList.contains('bp-visible')) { ok = false; }
        if (document.getElementById('bp-err-md').classList.contains('bp-visible')) { ok = false; }
        return ok;
    }

         'bp-style','bp-cql','bp-title-input','bp-ext','bp-load-input','bp-md','bp-geojson','bp-label'].forEach(function (id) {

    /* ── capture position from iframe ── */
    function doCapture() {
        try {
            var iw = document.getElementById('bp-iframe').contentWindow;
            var sv = iw && iw.SViewer;
            var view = sv && sv.view;
            if (!view) { return; }
            var c = view.getCenter();
            var z = view.getZoom();
            if (!c) { return; }
            document.getElementById('bp-x').value = Math.round(c[0]);
            document.getElementById('bp-y').value = Math.round(c[1]);
            document.getElementById('bp-z').value = z;
            updateBar();
        } catch (e) { /* cross-origin or not yet loaded */ }
    }

    /* ── load existing URL ── */
    function doLoad() {
        var raw = document.getElementById('bp-load-input').value.trim();
        if (!raw) { return; }
        var ok = parseUrl(raw);
        if (ok) {
            syncMutex();
            updateBar();
            doPreview();
        } else {
            alert(t('msg.load_invalid'));
        }
    }

    /* ── mutual exclusion: md= vs layers= ── */
    var _WMS_FIELDS  = ['bp-wms-url','bp-layer-name','bp-style','bp-cql','bp-opacity'];
    var _MD_DISABLES = ['bp-title-input']; /* md= sets title from CSW — manual title ignored */

    function syncMutex() {
        var mdFilled  = document.getElementById('bp-md').value.trim() !== '';
        var wmsFilled = document.getElementById('bp-layer-name').value.trim() !== '';

        _WMS_FIELDS.forEach(function (id) {
            document.getElementById(id).disabled = mdFilled;
        });
        _MD_DISABLES.forEach(function (id) {
            document.getElementById(id).disabled = mdFilled;
        });
        document.getElementById('bp-md').disabled = wmsFilled;
    }

    /* ── debounced auto-preview ── */
    var _previewTimer = null;
    function schedulePreview() {
        syncMutex();
        updateBar();
        clearTimeout(_previewTimer);
        _previewTimer = setTimeout(doPreview, 800);
    }

    /* ── wire events ── */
    function wireEvents() {
        document.getElementById('bp-btn-preview').addEventListener('click', function () {
            clearTimeout(_previewTimer);
            doPreview();
        });
        document.getElementById('bp-btn-copy').addEventListener('click', doCopy);
        document.getElementById('bp-btn-reset').addEventListener('click', doReset);
        document.getElementById('bp-btn-load').addEventListener('click', doLoad);
        document.getElementById('bp-btn-capture').addEventListener('click', doCapture);

        document.getElementById('bp-load-input').addEventListener('keydown', function (e) {
            if (e.key === 'Enter') { doLoad(); }
        });

        document.getElementById('bp-opacity').addEventListener('input', function () {
            document.getElementById('bp-opacity-val').textContent = this.value;
            schedulePreview();
        });

        ['bp-x','bp-y','bp-z','bp-style','bp-cql','bp-title-input','bp-ext','bp-md','bp-geojson','bp-label'].forEach(function (id) {
            document.getElementById(id).addEventListener('input', schedulePreview);
        });
        document.getElementById('bp-lb').addEventListener('change', schedulePreview);
        document.getElementById('bp-theme').addEventListener('change', schedulePreview);
        document.getElementById('bp-lang').addEventListener('change', schedulePreview);
        document.getElementById('bp-q').addEventListener('change', schedulePreview);
        document.getElementById('bp-s').addEventListener('change', schedulePreview);
        document.getElementById('bp-wms-url').addEventListener('input', function () {
            var el = document.getElementById('bp-wms-url');
            el.classList.remove('bp-error'); el.classList.remove('bp-ok');
            document.getElementById('bp-err-wms-url').classList.remove('bp-visible');
            document.getElementById('bp-ok-wms-url').classList.remove('bp-visible');
            schedulePreview();
        });
        document.getElementById('bp-wms-url').addEventListener('blur', function () {
            var url = this.value.trim();
            _validateWMSUrl(url, function (errKey) {
                if (errKey) { _showFieldError('bp-wms-url', 'bp-err-wms-url', errKey); }
                else if (url) { _showFieldOk('bp-wms-url', 'bp-err-wms-url', '✓ ' + t('ok.wms_url')); }
            });
        });
        document.getElementById('bp-layer-name').addEventListener('input', function () {
            var el = document.getElementById('bp-layer-name');
            el.classList.remove('bp-error'); el.classList.remove('bp-ok');
            document.getElementById('bp-err-layer-name').classList.remove('bp-visible');
            document.getElementById('bp-ok-layer-name').classList.remove('bp-visible');
            schedulePreview();
        });
        document.getElementById('bp-layer-name').addEventListener('blur', function () {
            var wmsUrl = document.getElementById('bp-wms-url').value.trim();
            if (wmsUrl) { return; } /* custom WMS — layer validated via WMS URL probe */
            _validateLayerName(this.value.trim(), function (errKey) {
                if (errKey) { _showFieldError('bp-layer-name', 'bp-err-layer-name', errKey); }
                else if (document.getElementById('bp-layer-name').value.trim()) {
                    _showFieldOk('bp-layer-name', 'bp-err-layer-name', '✓ ' + t('ok.layer_name'));

        document.getElementById('bp-geojson').addEventListener('blur', function () {
            var url = this.value.trim();
            _validateGeoJSONUrl(url, function (errKey) {

            });

        document.getElementById('bp-geojson').addEventListener('input', function () {
            var el = document.getElementById('bp-geojson');

            document.getElementById('bp-err-geojson').classList.remove('bp-visible');
            document.getElementById('bp-ok-geojson').classList.remove('bp-visible');
        });
        document.getElementById('bp-md').addEventListener('blur', function () {

                    _showFieldOk('bp-md', 'bp-err-md', '✓ ' + t('ok.md'));

            var el = document.getElementById('bp-md');

    /* ── populate basemap preset select from customConfig ── */
    var _defaultPresets = [
        { lb: 0, title: '0' },
        { lb: 1, title: '1' },
        { lb: 2, title: '2' }
    ];

    function populatePresets(presets) {
        var sel = document.getElementById('bp-lb');
        sel.innerHTML = '';
        presets.forEach(function (p, i) {
            var opt = document.createElement('option');
            opt.value = String(i);
            opt.textContent = p.title || String(i);
            sel.appendChild(opt);
        });
    }

    var _geOrchestraBaseUrl = '';

    function loadCustomConfig() {
        return new Promise(function (resolve) {
            var s = document.createElement('script');
            s.src = _base + 'local/customConfig.js';
            s.onload = function () {
                var cfg = window.customConfig || {};
                var presets = (cfg.backgroundPresets && cfg.backgroundPresets.length)
                    ? cfg.backgroundPresets
                    : _defaultPresets;
                populatePresets(presets);
                _geOrchestraBaseUrl = (cfg.geOrchestraBaseUrl || '').replace(/\/$/, '');
                if (_geOrchestraBaseUrl) {
                    var platform = document.getElementById('bp-platform');
                    document.getElementById('bp-platform-label').textContent = t('label.platform') + ' ';
                    var a = document.getElementById('bp-platform-url');
                    a.textContent = _geOrchestraBaseUrl;
                    a.href = _geOrchestraBaseUrl;
                    platform.style.display = '';
                }
                resolve();
            };
            s.onerror = function () {
                populatePresets(_defaultPresets);
                resolve();
            };
            document.head.appendChild(s);
        });
    }

    /* ── Extension autocomplete ── */
    var _extList = [];   // [{id, name, description}]

    function loadExtList() {
        fetch(_base + 'ext/extensions.json')
            .then(function (r) { return r.ok ? r.json() : []; })
            .then(function (data) { _extList = Array.isArray(data) ? data : []; })
            .catch(function () {});
    }

    (function () {
        var inp    = document.getElementById('bp-ext');
        var list   = document.getElementById('bp-ac-list');
        var cursor = -1;

        function currentToken() {
            var val    = inp.value;
            var pos    = inp.selectionStart;
            var before = val.substring(0, pos);
            var parts  = before.split(',');
            return parts[parts.length - 1].trim().toLowerCase();
        }

        function replaceLastToken(id) {
            var val    = inp.value;
            var pos    = inp.selectionStart;
            var before = val.substring(0, pos);
            var after  = val.substring(pos);
            var commaIdx = before.lastIndexOf(',');
            var prefix = commaIdx >= 0 ? before.substring(0, commaIdx + 1) + ' ' : '';
            // also collect already-used ids so we don't duplicate
            inp.value = prefix + id + (after.trimStart().startsWith(',') ? after : '');
            inp.setSelectionRange((prefix + id).length, (prefix + id).length);
        }

        function usedIds() {
            return inp.value.split(',').map(function (s) { return s.trim(); });
        }

        function openList(items) {
            list.innerHTML = '';
            cursor = -1;
            if (!items.length) { closeList(); return; }
            items.forEach(function (ext, i) {
                var li = document.createElement('li');
                li.className = 'bp-ac-item';
                li.setAttribute('role', 'option');
                li.setAttribute('aria-selected', 'false');
                li.title = ext.description;
                li.dataset.id = ext.id;
                li.innerHTML = '<div class="bp-ac-item-name">' + escAc(ext.name) + ' <code style="font-weight:400;font-size:10px">' + escAc(ext.id) + '</code></div>'
                             + '<div class="bp-ac-item-desc">' + escAc(ext.description) + '</div>';
                li.addEventListener('mousedown', function (e) {
                    e.preventDefault();
                    pick(ext.id);
                });
                list.appendChild(li);
            });
            list.classList.add('bp-ac-open');
            inp.setAttribute('aria-expanded', 'true');
        }

        function closeList() {
            list.classList.remove('bp-ac-open');
            list.innerHTML = '';
            inp.setAttribute('aria-expanded', 'false');
            cursor = -1;
        }

        function pick(id) {
            replaceLastToken(id);
            closeList();
            schedulePreview();
        }

        function setCursor(idx) {
            var items = list.querySelectorAll('.bp-ac-item');
            items.forEach(function (el, i) { el.setAttribute('aria-selected', i === idx ? 'true' : 'false'); });
            cursor = idx;
        }

        function suggest() {
            var tok  = currentToken();
            var used = usedIds();
            // show all if empty token, filter by prefix/name otherwise
            var matches = _extList.filter(function (ext) {
                if (used.indexOf(ext.id) !== -1 && ext.id !== tok) { return false; } // already used
                if (!tok) { return true; }
                return ext.id.indexOf(tok) !== -1 || ext.name.toLowerCase().indexOf(tok) !== -1;
            });
            if (matches.length) { openList(matches); } else { closeList(); }
        }

        inp.addEventListener('input', suggest);
        inp.addEventListener('focus', suggest);
        inp.addEventListener('blur', function () { setTimeout(closeList, 150); });

        inp.addEventListener('keydown', function (e) {
            var items = list.querySelectorAll('.bp-ac-item');
            if (!list.classList.contains('bp-ac-open')) { return; }
            if (e.key === 'ArrowDown') {
                e.preventDefault();
                setCursor(Math.min(cursor + 1, items.length - 1));
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                setCursor(Math.max(cursor - 1, 0));
            } else if (e.key === 'Enter' && cursor >= 0) {
                e.preventDefault();
                pick(items[cursor].dataset.id);
            } else if (e.key === 'Escape') {
                closeList();
            }
        });

        function escAc(s) {
            return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }
    }());

    /* ── Layer name autocomplete ── */
    (function () {
        var inp    = document.getElementById('bp-layer-name');
        var list   = document.getElementById('bp-layer-ac-list');
        var cursor = -1;

        function openList(layers) {
            list.innerHTML = '';
            cursor = -1;
            if (!layers.length) { closeList(); return; }
            layers.forEach(function (layer) {
                var li = document.createElement('li');
                li.className = 'bp-ac-item';
                li.setAttribute('role', 'option');
                li.setAttribute('aria-selected', 'false');
                li.dataset.name = layer.name;
                var esc = function (s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); };
                li.innerHTML = '<div class="bp-ac-item-name">' + esc(layer.name) + '</div>'
                             + (layer.title ? '<div class="bp-ac-item-desc">' + esc(layer.title) + '</div>' : '');
                li.addEventListener('mousedown', function (e) {
                    e.preventDefault();
                    inp.value = layer.name;
                    closeList();
                    inp.classList.remove('bp-error');
                    document.getElementById('bp-err-layer-name').classList.remove('bp-visible');
                    schedulePreview();
                });
                list.appendChild(li);
            });
            list.classList.add('bp-ac-open');
            inp.setAttribute('aria-expanded', 'true');
        }

        function closeList() {
            list.classList.remove('bp-ac-open');
            list.innerHTML = '';
            inp.setAttribute('aria-expanded', 'false');
            cursor = -1;
        }

        function setCursor(idx) {
            var items = list.querySelectorAll('.bp-ac-item');
            items.forEach(function (el, i) { el.setAttribute('aria-selected', i === idx ? 'true' : 'false'); });
            cursor = idx;
        }

        function suggest() {
            var wmsUrl = document.getElementById('bp-wms-url').value.trim();
            if (!wmsUrl) { closeList(); return; }
            var clean;
            try { clean = _cleanWMSEndpoint(wmsUrl); } catch (e) { closeList(); return; }
            var cached = _wmsLayerCache[clean];
            if (!cached || !cached.length) { closeList(); return; }
            var tok = inp.value.trim().toLowerCase();
            var matches = cached.filter(function (l) {
                if (!tok) { return true; }
                return l.name.toLowerCase().indexOf(tok) !== -1 || l.title.toLowerCase().indexOf(tok) !== -1;
            }).slice(0, 15);
            openList(matches);
        }

        inp.addEventListener('input', function () { suggest(); });
        inp.addEventListener('focus', function () { suggest(); });
        inp.addEventListener('blur',  function () { setTimeout(closeList, 150); });

        inp.addEventListener('keydown', function (e) {
            var items = list.querySelectorAll('.bp-ac-item');
            if (e.key === 'ArrowDown') {
                e.preventDefault();
                setCursor(Math.min(cursor + 1, items.length - 1));
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                setCursor(Math.max(cursor - 1, 0));
            } else if (e.key === 'Enter' && cursor >= 0) {
                e.preventDefault();
                inp.value = items[cursor].dataset.name;
                closeList();
                schedulePreview();
            } else if (e.key === 'Escape') {
                closeList();
            }
        });
    }());

    /* ── init ── */
    loadExtList();

    Promise.all([
        fetch(_base + 'ext/blueprint/i18n.json')
            .then(function (r) { return r.json(); })
            .then(function (data) { _i18n = data; applyI18n(); })
            .catch(function () {}),
        loadCustomConfig()
    ]).finally(function () {
        wireEvents();
        syncMutex();
        updateBar();
        document.getElementById('bp-iframe').src = _base + 'index.html';
    });

}());
</script>
</body>
</html>
