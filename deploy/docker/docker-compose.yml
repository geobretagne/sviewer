services:
  sviewer:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    image: sviewer:latest
    ports:
      - "8080:80"
    volumes:
      # Optional: mount your local/ directory for config, named profiles, sample data.
      # The container works without it — built-in defaults apply.
      # - ./local:/usr/share/nginx/html/sviewer/local:ro
      # Optional: custom nginx server block
      # - ./nginx-server.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/sviewer/"]
      interval: 30s
      timeout: 3s
      retries: 3
    restart: unless-stopped
