services:
  sviewer:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    image: sviewer:latest
    ports:
      - "8080:80"
    volumes:
      # Mount local/ for deployer customization.
      # Container works without this mount — built-in defaults apply.
      #   customConfig.js     : main config — https://github.com/geobretagne/sviewer/blob/master/local/customConfig.DIST.js
      #   customConfig_xxx.js : named profiles loaded via ?c=xxx
      #   data/, assets/      : any file served under /sviewer/local/
      - ../../local:/usr/share/nginx/html/sviewer/local:ro
      # Optional: override nginx config (e.g. custom path, TLS)
      # Template: https://github.com/geobretagne/sviewer/blob/master/deploy/docker/nginx-default.conf
      # - ./nginx-default.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/sviewer/"]
      interval: 30s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 64M
        reservations:
          cpus: '0.10'
          memory: 32M
    restart: unless-stopped
