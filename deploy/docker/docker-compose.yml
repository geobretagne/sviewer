services:
  sviewer:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    image: sviewer:latest
    ports:
      - "8080:80"
    volumes:
      # Mount local/ for deployer customization:
      #   - customConfig.js         : main configuration (copy from customConfig.DIST.js)
      #   - customConfig_xxx.js     : named profiles (?c=xxx)
      #   - data/, assets/, etc.    : any file served under /sviewer/local/
      # Container works without this mount — built-in defaults apply.
      - ../../local:/usr/share/nginx/html/sviewer/local:ro
      # Optional: override nginx config (e.g. custom path, TLS)
      # - ./nginx-default.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/sviewer/"]
      interval: 30s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 64M
        reservations:
          cpus: '0.10'
          memory: 32M
    restart: unless-stopped
