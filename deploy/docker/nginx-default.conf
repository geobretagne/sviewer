server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # --- Default: block everything under /sviewer/ --------------------------
    location /sviewer/ { return 404; }

    # --- deploy/ — never serve infra files ----------------------------------
    location ^~ /sviewer/deploy/ { return 404; }

    # --- Connectors — relaxed CSP -------------------------------------------
    location ~ ^/sviewer/connectors/ {
        try_files $uri $uri/index.html =404;
        add_header Content-Security-Policy "default-src 'none'; script-src 'self' https://docs.getgrist.com 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https:; base-uri 'self'; form-action 'none'; frame-ancestors *; upgrade-insecure-requests;" always;
        add_header Cache-Control          "no-cache, no-store, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff"                             always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin"     always;
        add_header Vary                   "Accept-Encoding"                     always;
    }

    # --- static/lib/ — immutable vendored assets (1-year cache) -------------
    location ~ ^/sviewer/static/lib/ {
        try_files $uri =404;
        add_header Content-Security-Policy "default-src 'none'; script-src 'self' 'sha256-wnylQc7kal79rLIZpYxNS9cGvALWsA+k/xK3L7I4xVw='; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https:; manifest-src 'self'; base-uri 'self'; form-action 'none'; frame-ancestors *; upgrade-insecure-requests;" always;
        add_header Cache-Control          "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff"                             always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin"     always;
        add_header Vary                   "Accept-Encoding"                     always;
    }

    # --- static/ — app assets (short cache) ---------------------------------
    location ~ ^/sviewer/static/ {
        try_files $uri =404;
        add_header Content-Security-Policy "default-src 'none'; script-src 'self' 'sha256-wnylQc7kal79rLIZpYxNS9cGvALWsA+k/xK3L7I4xVw='; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https:; manifest-src 'self'; base-uri 'self'; form-action 'none'; frame-ancestors *; upgrade-insecure-requests;" always;
        add_header Cache-Control          "public, max-age=3600, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff"                               always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin"       always;
        add_header Vary                   "Accept-Encoding"                       always;
    }

    # --- local/ — deployer sandbox (config, data, named profiles) -----------
    location ~ ^/sviewer/local/ {
        try_files $uri =404;
        add_header Content-Security-Policy "default-src 'none'; script-src 'self' 'sha256-wnylQc7kal79rLIZpYxNS9cGvALWsA+k/xK3L7I4xVw='; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https:; manifest-src 'self'; base-uri 'self'; form-action 'none'; frame-ancestors *; upgrade-insecure-requests;" always;
        add_header Cache-Control          "no-cache, must-revalidate"             always;
        add_header X-Content-Type-Options "nosniff"                               always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin"       always;
        add_header Vary                   "Accept-Encoding"                       always;
    }

    # --- App entry point + PWA files — no cache -----------------------------
    location ~ ^/sviewer/(index\.html|manifest\.json|sw\.js)$ {
        try_files $uri =404;
        add_header Content-Security-Policy "default-src 'none'; script-src 'self' 'sha256-wnylQc7kal79rLIZpYxNS9cGvALWsA+k/xK3L7I4xVw='; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https:; manifest-src 'self'; base-uri 'self'; form-action 'none'; frame-ancestors *; upgrade-insecure-requests;" always;
        add_header Cache-Control          "no-cache, no-store, must-revalidate"   always;
        add_header X-Content-Type-Options "nosniff"                               always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin"       always;
        add_header Vary                   "Accept-Encoding"                       always;
    }

    # --- Directory root → index.html ----------------------------------------
    location = /sviewer/ {
        try_files /sviewer/index.html =404;
        add_header Content-Security-Policy "default-src 'none'; script-src 'self' 'sha256-wnylQc7kal79rLIZpYxNS9cGvALWsA+k/xK3L7I4xVw='; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https:; manifest-src 'self'; base-uri 'self'; form-action 'none'; frame-ancestors *; upgrade-insecure-requests;" always;
        add_header Cache-Control          "no-cache, no-store, must-revalidate"   always;
        add_header X-Content-Type-Options "nosniff"                               always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin"       always;
        add_header Vary                   "Accept-Encoding"                       always;
    }
}
