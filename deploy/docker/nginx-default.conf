server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;

    server_tokens off;

    client_max_body_size    1k;
    client_body_timeout     10s;
    client_header_timeout   10s;
    keepalive_timeout       30s;
    send_timeout            10s;

    gzip on;
    gzip_types text/html text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    open_file_cache         max=1000 inactive=60s;
    open_file_cache_valid   30s;

    # --- Default: block everything under /sviewer/ --------------------------
    location /sviewer/ { return 404; }

    # --- deploy/ — never serve infra files ----------------------------------
    location ^~ /sviewer/deploy/ { return 404; }

    # --- Extensions — relaxed CSP ------------------------------------------------
    location ~ ^/sviewer/connectors/(.*)$ { return 301 /sviewer/ext/$1; }
    location ~ ^/sviewer/skill/(.*)$ { return 301 /sviewer/ext/$1; }
    location ~ ^/sviewer/ext/ {
        try_files $uri $uri/index.html =404;
        add_header Content-Security-Policy "default-src 'none'; script-src 'self' https://docs.getgrist.com 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self'; connect-src 'self' https:; frame-src 'self'; base-uri 'self'; form-action 'none'; frame-ancestors *; upgrade-insecure-requests;" always;
        add_header Cache-Control          "no-cache, no-store, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff"                             always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin"     always;
        add_header Vary                   "Accept-Encoding"                     always;
    }

    # --- static/lib/ — vendored assets (1h cache) ----------------------------
    location ~ ^/sviewer/static/lib/ {
        try_files $uri =404;
        add_header Content-Security-Policy "default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self'; connect-src 'self' https:; manifest-src 'self'; base-uri 'self'; form-action 'none'; frame-ancestors *; upgrade-insecure-requests;" always;
        add_header Cache-Control          "public, max-age=3600, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff"                             always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin"     always;
        add_header Vary                   "Accept-Encoding"                     always;
    }

    # --- static/ — app assets (short cache) ---------------------------------
    location ~ ^/sviewer/static/ {
        try_files $uri =404;
        add_header Content-Security-Policy "default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self'; connect-src 'self' https:; manifest-src 'self'; base-uri 'self'; form-action 'none'; frame-ancestors *; upgrade-insecure-requests;" always;
        add_header Cache-Control          "public, max-age=3600, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff"                               always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin"       always;
        add_header Vary                   "Accept-Encoding"                       always;
    }

    # --- local/ — deployer sandbox (config, data, named profiles) -----------
    location ~ ^/sviewer/local/ {
        try_files $uri =404;
        add_header Content-Security-Policy "default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self'; connect-src 'self' https:; manifest-src 'self'; base-uri 'self'; form-action 'none'; frame-ancestors *; upgrade-insecure-requests;" always;
        add_header Cache-Control          "no-cache, must-revalidate"             always;
        add_header X-Content-Type-Options "nosniff"                               always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin"       always;
        add_header Vary                   "Accept-Encoding"                       always;
    }

    # --- tests/ — browser test suite (no-cache, frame-src self for visual tests) ---
    location ~ ^/sviewer/tests/ {
        try_files $uri $uri/index.html =404;
        add_header Content-Security-Policy "default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self'; connect-src 'self' https:; frame-src 'self'; base-uri 'self'; form-action 'none'; frame-ancestors *; upgrade-insecure-requests;" always;
        add_header Cache-Control          "no-cache, no-store, must-revalidate"   always;
        add_header X-Content-Type-Options "nosniff"                               always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin"       always;
        add_header Vary                   "Accept-Encoding"                       always;
    }

    # --- App entry point + PWA files — no cache -----------------------------
    location ~ ^/sviewer/(index\.html|manifest\.json|sw\.js)$ {
        try_files $uri =404;
        add_header Content-Security-Policy "default-src 'none'; script-src 'self' 'sha256-CjlFa9VPiA6Sf1H5d94z/7u4hBXTZOiehEhvctTGQpQ='; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self'; connect-src 'self' https:; manifest-src 'self'; base-uri 'self'; form-action 'none'; frame-ancestors *; upgrade-insecure-requests;" always;
        add_header Cache-Control          "no-cache, no-store, must-revalidate"   always;
        add_header X-Content-Type-Options "nosniff"                               always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin"       always;
        add_header Vary                   "Accept-Encoding"                       always;
    }

    # --- Directory root → index.html ----------------------------------------
    location = /sviewer/ {
        try_files /sviewer/index.html =404;
        add_header Content-Security-Policy "default-src 'none'; script-src 'self' 'sha256-CjlFa9VPiA6Sf1H5d94z/7u4hBXTZOiehEhvctTGQpQ='; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self'; connect-src 'self' https:; manifest-src 'self'; base-uri 'self'; form-action 'none'; frame-ancestors *; upgrade-insecure-requests;" always;
        add_header Cache-Control          "no-cache, no-store, must-revalidate"   always;
        add_header X-Content-Type-Options "nosniff"                               always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin"       always;
        add_header Vary                   "Accept-Encoding"                       always;
    }
}
