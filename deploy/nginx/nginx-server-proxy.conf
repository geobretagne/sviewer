# sViewer — nginx server{} context snippet (reverse-proxy variant)
#
# Use this file when nginx fronts a backend that serves sViewer.
# The backend does NOT need its own sViewer snippet — security is enforced here.
#
# Usage: include inside a server{} block, e.g.:
#
#   server {
#       listen 443 ssl;
#       ...
#       include /path/to/sviewer/deploy/nginx/nginx-server-proxy.conf;
#   }
#
# To adapt: sed -i 's|BACKEND_URL|http://your-backend:8080|g' nginx-server-proxy.conf
# To change path: sed -i 's|/sviewer|/your-path|g' nginx-server-proxy.conf
#
# Prerequisites:
#   - ngx_http_headers_module  (standard)
#   - ngx_http_proxy_module    (standard)

# --- sViewer (proxy) -------------------------------------------------------
#
# Path allowlist strategy: only explicitly whitelisted paths are proxied.
# Everything else returns 404 here — never forwarded to backend.

# Deny sensitive paths — ^~ prevents regex locations from matching these
location ^~ /sviewer/node_modules/  { return 404; }
location ^~ /sviewer/scripts/       { return 404; }
location ^~ /sviewer/deploy/        { return 404; }
location ^~ /sviewer/.              { return 404; }

# Deny sensitive files by regex
location ~* ^/sviewer/(CLAUDE|CREDITS|CHANGELOG|TECHNICAL|README|Dockerfile|package(-lock)?\.json|postcss\.config\.js|build/ol-custom-entry\.js)(\..*)?$ {
    return 404;
}

# Deny dotfiles and backup extensions
location ~* ^/sviewer/.*\.(bak|orig|log|sh|py|rb|pl|md)$ {
    return 404;
}

# Skill — relaxed CSP (external scripts + unsafe-inline/eval for Grist)
location ~* ^/sviewer/connectors/(.*)$ { return 301 /sviewer/skill/$1; }
location ~* ^/sviewer/skill/ {
    proxy_pass       BACKEND_URL;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    add_header X-Content-Type-Options "nosniff"                        always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy
        "default-src 'none'; script-src 'self' https://docs.getgrist.com 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https:; base-uri 'self'; form-action 'none'; frame-ancestors *; upgrade-insecure-requests;"
        always;
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header Vary "Accept-Encoding" always;
}

# local/ — deployer sandbox (config, data, named profiles) — no-cache
location ~* ^/sviewer/local/ {
    proxy_pass       BACKEND_URL;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    add_header X-Content-Type-Options "nosniff"                        always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy
        "default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https:; manifest-src 'self'; base-uri 'self'; form-action 'none'; frame-ancestors *; upgrade-insecure-requests;"
        always;
    add_header Cache-Control "no-cache, must-revalidate" always;
    add_header Vary "Accept-Encoding" always;
}

# static/lib/ — vendored assets (1h cache)
location ~* ^/sviewer/static/lib/ {
    proxy_pass       BACKEND_URL;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    add_header X-Content-Type-Options "nosniff"                        always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy
        "default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https:; manifest-src 'self'; base-uri 'self'; form-action 'none'; frame-ancestors *; upgrade-insecure-requests;"
        always;
    add_header Cache-Control "public, max-age=3600, must-revalidate" always;
    add_header Vary "Accept-Encoding" always;
}

# Main sViewer location — proxy all allowlisted paths
location /sviewer/ {
    proxy_pass       BACKEND_URL;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    add_header X-Content-Type-Options "nosniff"                        always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy
        "default-src 'none'; script-src 'self' 'sha256-yuoFDDn9NB/z/U7Xv57M55yNL6My5j/eu4kMXAWNmUU='; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https:; manifest-src 'self'; base-uri 'self'; form-action 'none'; frame-ancestors *; upgrade-insecure-requests;"
        always;
    # Note: hash above covers the inline script in index.html only — correct for this catch-all block

    set $cc "public, max-age=3600, must-revalidate";
    if ($uri ~* "^/sviewer/static/lib/")        { set $cc "public, max-age=3600, must-revalidate"; }
    if ($uri ~* "^/sviewer/(index\.html)?$")   { set $cc "no-cache, no-store, must-revalidate"; }
    add_header Cache-Control $cc always;
    add_header Vary "Accept-Encoding" always;
}
