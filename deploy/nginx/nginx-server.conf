# sViewer — nginx server{} context snippet
#
# Usage: include inside a server{} block, e.g.:
#
#   server {
#       listen 80;
#       root /var/www/html;
#       include /path/to/sviewer/deploy/nginx/nginx-server.conf;
#   }
#
# Security strategy: allowlist — /sviewer/ returns 404 by default.
# Only explicitly whitelisted locations are served. New files added to the
# repo are blocked automatically without any config change.
#
# To change the deployment path, update the prefix in every location below
# (search/replace /sviewer/ → /your/path/).
#
# nginx add_header inheritance caveat: a location block that defines ANY
# add_header drops ALL parent add_header directives. Headers are therefore
# repeated in each block — do not factor them out to the server{} context.
#
# Prerequisites: ngx_http_headers_module (standard)

# Shared CSP values (edit here, copy to each location below)
#
# Main CSP:
#   "default-src 'none'; script-src 'self' 'sha256-CjlFa9VPiA6Sf1H5d94z/7u4hBXTZOiehEhvctTGQpQ='; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self'; connect-src 'self' https:; manifest-src 'self'; base-uri 'self'; form-action 'none'; frame-ancestors *; upgrade-insecure-requests;"
#
# Grist CSP (relaxed — external script + unsafe-inline/eval):
#   "default-src 'none'; script-src 'self' https://docs.getgrist.com 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self'; connect-src 'self' https:; base-uri 'self'; form-action 'none'; frame-ancestors *; upgrade-insecure-requests;"

# --- Default: block everything under /sviewer/ ----------------------------
location /sviewer/ { return 404; }

# --- deploy/ — never serve config/infra files -----------------------------
location ^~ /sviewer/deploy/ { return 404; }

# --- Extensions — relaxed CSP --------------------------------------------------
location ~ ^/sviewer/connectors/(.*)$ { return 301 /sviewer/ext/$1; }
location ~ ^/sviewer/skill/(.*)$ { return 301 /sviewer/ext/$1; }
location ~ ^/sviewer/ext/ {
    try_files $uri $uri/index.html =404;
    add_header Content-Security-Policy "default-src 'none'; script-src 'self' https://docs.getgrist.com 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self'; connect-src 'self' https:; base-uri 'self'; form-action 'none'; frame-ancestors *; upgrade-insecure-requests;" always;
    add_header Cache-Control          "no-cache, no-store, must-revalidate" always;
    add_header X-Content-Type-Options "nosniff"                             always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin"     always;
    add_header Vary                   "Accept-Encoding"                     always;
}

# --- static/lib/ — vendored assets (1h cache) ---------------
location ~ ^/sviewer/static/lib/ {
    try_files $uri =404;
    add_header Content-Security-Policy "default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self'; connect-src 'self' https:; manifest-src 'self'; base-uri 'self'; form-action 'none'; frame-ancestors *; upgrade-insecure-requests;" always;
    add_header Cache-Control          "public, max-age=3600, must-revalidate" always;
    add_header X-Content-Type-Options "nosniff"                             always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin"     always;
    add_header Vary                   "Accept-Encoding"                     always;
}

# --- static/ — app assets (short cache) -----------------------------------
location ~ ^/sviewer/static/ {
    try_files $uri =404;
    add_header Content-Security-Policy "default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self'; connect-src 'self' https:; manifest-src 'self'; base-uri 'self'; form-action 'none'; frame-ancestors *; upgrade-insecure-requests;" always;
    add_header Cache-Control          "public, max-age=3600, must-revalidate" always;
    add_header X-Content-Type-Options "nosniff"                               always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin"       always;
    add_header Vary                   "Accept-Encoding"                       always;
}

# --- local/ — deployer sandbox (config, data, named profiles) ---------------
# Serves everything under local/ — deployer owns this directory.
# JS files (customConfig*.js) are no-cache so changes are immediate.
location ~ ^/sviewer/local/ {
    try_files $uri =404;
    add_header Content-Security-Policy "default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self'; connect-src 'self' https:; manifest-src 'self'; base-uri 'self'; form-action 'none'; frame-ancestors *; upgrade-insecure-requests;" always;
    add_header Cache-Control          "no-cache, must-revalidate"             always;
    add_header X-Content-Type-Options "nosniff"                               always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin"       always;
    add_header Vary                   "Accept-Encoding"                       always;
}

# --- tests/ — browser test suite (no-cache, frame-src self for visual tests) ---
location ~ ^/sviewer/tests/ {
    try_files $uri $uri/index.html =404;
    add_header Content-Security-Policy "default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self'; connect-src 'self' https:; frame-src 'self'; base-uri 'self'; form-action 'none'; frame-ancestors *; upgrade-insecure-requests;" always;
    add_header Cache-Control          "no-cache, no-store, must-revalidate"   always;
    add_header X-Content-Type-Options "nosniff"                               always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin"       always;
    add_header Vary                   "Accept-Encoding"                       always;
}

# --- App entry point + PWA files — no cache --------------------------------
location ~ ^/sviewer/(index\.html|manifest\.json|sw\.js)$ {
    try_files $uri =404;
    add_header Content-Security-Policy "default-src 'none'; script-src 'self' 'sha256-CjlFa9VPiA6Sf1H5d94z/7u4hBXTZOiehEhvctTGQpQ='; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self'; connect-src 'self' https:; manifest-src 'self'; base-uri 'self'; form-action 'none'; frame-ancestors *; upgrade-insecure-requests;" always;
    add_header Cache-Control          "no-cache, no-store, must-revalidate"   always;
    add_header X-Content-Type-Options "nosniff"                               always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin"       always;
    add_header Vary                   "Accept-Encoding"                       always;
}

# --- Directory root → index.html ------------------------------------------
location = /sviewer/ {
    try_files /sviewer/index.html =404;
    add_header Content-Security-Policy "default-src 'none'; script-src 'self' 'sha256-CjlFa9VPiA6Sf1H5d94z/7u4hBXTZOiehEhvctTGQpQ='; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self'; connect-src 'self' https:; manifest-src 'self'; base-uri 'self'; form-action 'none'; frame-ancestors *; upgrade-insecure-requests;" always;
    add_header Cache-Control          "no-cache, no-store, must-revalidate"   always;
    add_header X-Content-Type-Options "nosniff"                               always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin"       always;
    add_header Vary                   "Accept-Encoding"                       always;
}
