# sViewer — nginx configuration
#
# Two separate snippets — include each in the correct context:
#
#   In http{} block (nginx.conf or conf.d/):
#       include /path/to/sviewer/etc/nginx-http.conf;
#
#   In server{} block (sites-enabled/default or vhost conf):
#       include /path/to/sviewer/etc/nginx-server.conf;
#
# Example /etc/nginx/sites-enabled/default:
#
#   server {
#       listen 80 default_server;
#       listen [::]:80 default_server;
#       root /var/www/html;
#       server_name _;
#
#       location / {
#           try_files $uri $uri/ =404;
#       }
#
#       include /var/www/html/sviewer/etc/nginx-server.conf;
#   }
#
# Example /etc/nginx/nginx.conf (inside http{}):
#
#   http {
#       ...
#       include /var/www/html/sviewer/etc/nginx-http.conf;
#       ...
#   }
