<!DOCTYPE html>
<html lang="en"><!-- remplacé dynamiquement par widget.js selon navigator.language -->
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sViewer — Grist widget</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; font-size: 14px; background: #fff; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        #sv-toolbar {
            display: flex; align-items: center; gap: 8px;
            padding: 6px 10px; background: #f5f5f5; border-bottom: 1px solid #ddd;
            flex-shrink: 0; flex-wrap: wrap; /* wrap pour les widgets étroits */
        }
        #sv-toolbar button {
            padding: 4px 10px; font-size: 13px; border: 1px solid #bbb;
            border-radius: 3px; background: #fff; cursor: pointer;
        }
        #sv-toolbar button:hover { background: #e8e8e8; }
        #sv-toolbar button:disabled { color: #bbb; cursor: default; }
        #sv-toolbar button:disabled:hover { background: #fff; }

        /* groupe label + select inline dans la barre d'outils */
        .sv-col-group { display: flex; align-items: center; gap: 4px; }
        .sv-col-group label { font-size: 12px; color: #555; white-space: nowrap; cursor: default; }
        .sv-col-group select { padding: 2px 4px; font-size: 13px; border: 1px solid #bbb; border-radius: 3px; max-width: 150px; }

        /* margin-left:auto pousse le statut et le bouton vers la droite */
        #sv-status { font-size: 12px; color: #666; margin-left: auto; }

        #sv-map { flex: 1; }

    </style>
</head>
<body>

<div id="sv-toolbar">
    <!-- mode géométrie (default) -->
    <div class="sv-col-group" id="sv-group-geom">
        <!-- libellé lié au select via for/id pour l'accessibilité (WCAG 4.1.2) -->
        <label for="sv-sel-geom" data-i18n="geom.col"></label>
        <select id="sv-sel-geom"></select>
    </div>
    <!-- mode lat/lon (hidden until auto-detected or no geometry column found) -->
    <div class="sv-col-group" id="sv-group-lat" style="display:none">
        <label for="sv-sel-lat" data-i18n="lat.col"></label>
        <select id="sv-sel-lat"></select>
    </div>
    <div class="sv-col-group" id="sv-group-lon" style="display:none">
        <label for="sv-sel-lon" data-i18n="lon.col"></label>
        <select id="sv-sel-lon"></select>
    </div>
    <div class="sv-col-group">
        <label for="sv-sel-label" data-i18n="label.col"></label>
        <select id="sv-sel-label"></select>
    </div>
    <!-- role=status + aria-live : annonce les mises à jour aux lecteurs d'écran (WCAG 4.1.3) -->
    <span id="sv-status" role="status" aria-live="polite" data-i18n="loading"></span>
    <!-- data-i18n-aria : aria-label traduit, plus fiable que title pour les lecteurs d'écran -->
    <button id="sv-btn-clear" data-i18n="clear" data-i18n-aria="clear.title" disabled></button>
</div>

<div id="sv-map"></div>

<!-- API Grist — doit être chargée en premier (expose l'objet global `grist`) -->
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>

<!-- sViewer embed — charge OL, jQuery, Bootstrap et crée le DOM sViewer dans #sv-map -->
<script src="../../js/embed.js"></script>

<!-- Logique du widget — dépend de `grist` et de `SViewer` (embed.js) -->
<script src="widget.js"></script>

</body>
</html>
